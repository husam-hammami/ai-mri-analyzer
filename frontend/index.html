                          <div className="finding-card severity-normal" style={{borderLeft: '3px solid #06b6d4', marginTop: 'var(--s-4)'}}>
                            <div className="finding-header">
                              <div className="finding-level-group">
                                <span className="finding-level">Alignment</span>
                              </div>
                            </div>
                            <div className="finding-body">
                              <div className="finding-row">{interpretation.alignment}</div>
                            </div>
                          </div>
                        )}
                        {interpretation?.conus && (
                          <div className="finding-card severity-normal" style={{borderLeft: '3px solid #8b5cf6'}}>
                            <div className="finding-header">
                              <div className="finding-level-group">
                                <span className="finding-level">Conus Medullaris</span>
                              </div>
                            </div>
                            <div className="finding-body">
                              <div className="finding-row">{interpretation.conus}</div>
                            </div>
                          </div>
                        )}
                        {interpretation?.post_surgical_assessment && (
                          <div className="finding-card severity-normal" style={{borderLeft: '3px solid #f59e0b'}}>
                            <div className="finding-header">
                              <div className="finding-level-group">
                                <span className="finding-level">Post-Surgical Assessment</span>
                              </div>
                            </div>
                            <div className="finding-body">
                              <div className="finding-row">{interpretation.post_surgical_assessment}</div>
                            </div>
                          </div>
                        )}
                      </React.Fragment>
                    )}

                    {/* ═══ BRAIN FINDINGS ═══ */}
                    {anatomyType === 'brain' && (
                      <React.Fragment>
                        <div className="section-header">
                          <div className="section-icon blue">
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#4c8dff" strokeWidth="1.5" strokeLinecap="round">
                              <circle cx="7" cy="7" r="5"/>
                              <path d="M7 2c-1.5 2-1.5 4 0 5s1.5 3 0 5"/>
                              <path d="M4 4.5h6M4 9.5h6"/>
                            </svg>
                          </div>
                          <div className="section-title">Findings by Region</div>
                          <div className="section-divider" />
                        </div>

                        {Object.entries(findingsByRegion).map(([region, text]) => (
                          <div key={region} id={`finding-${region}`} className="finding-card severity-normal">
                            <div className="finding-header">
                              <div className="finding-level-group">
                                <span className="finding-level">{region.replace(/_/g, ' ')}</span>
                              </div>
                              <span className="tier-badge tier-b">Tier B</span>
                            </div>
                            <div className="finding-body">
                              <div className="finding-row">
                                <span className="finding-label">Assessment</span>
                                {text}
                              </div>
                            </div>
                          </div>
                        ))}

                        {interpretation?.enhancement_pattern && (
                          <div className="finding-card severity-normal" style={{borderLeft: '3px solid var(--accent)'}}>
                            <div className="finding-header">
                              <div className="finding-level-group">
                                <span className="finding-level">Enhancement</span>
                              </div>
                            </div>
                            <div className="finding-body">
                              <div className="finding-row">
                                <span className="finding-label">Pattern</span>
                                {interpretation.enhancement_pattern}
                              </div>
                            </div>
                          </div>
                        )}

                        {interpretation?.diffusion_findings && (
                          <div className="finding-card severity-normal" style={{borderLeft: '3px solid #f59e0b'}}>
                            <div className="finding-header">
                              <div className="finding-level-group">
                                <span className="finding-level">Diffusion</span>
                              </div>
                            </div>
                            <div className="finding-body">
                              <div className="finding-row">
                                <span className="finding-label">DWI/ADC</span>
                                {interpretation.diffusion_findings}
                              </div>
                            </div>
                          </div>
                        )}
                      </React.Fragment>
                    )}

                    {/* ═══ MSK FINDINGS ═══ */}
                    {anatomyType === 'msk' && (
                      <React.Fragment>
                        <div className="section-header">
                          <div className="section-icon blue">
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#4c8dff" strokeWidth="1.5" strokeLinecap="round">
                              <path d="M4 2v4c0 1 1 2 3 2s3-1 3-2V2"/>
                              <path d="M3 8l1 4h6l1-4"/>
                            </svg>
                          </div>
                          <div className="section-title">Findings by Structure</div>
                          <div className="section-divider" />
                        </div>

                        {Object.entries(findingsByStructure).map(([structure, text]) => (
                          <div key={structure} id={`finding-${structure}`} className="finding-card severity-normal">
                            <div className="finding-header">
                              <div className="finding-level-group">
                                <span className="finding-level">{structure.replace(/_/g, ' ')}</span>
                              </div>
                              <span className="tier-badge tier-b">Tier B</span>
                            </div>
                            <div className="finding-body">
                              <div className="finding-row">
                                <span className="finding-label">Assessment</span>
                                {text}
                              </div>
                            </div>
                          </div>
                        ))}

                        {interpretation?.joint_effusion && (
                          <div className="finding-card severity-normal" style={{borderLeft: '3px solid #06b6d4'}}>
                            <div className="finding-header">
                              <div className="finding-level-group">
                                <span className="finding-level">Joint Effusion</span>
                              </div>
                            </div>
                            <div className="finding-body">
                              <div className="finding-row">
                                <span className="finding-label">Status</span>
                                {interpretation.joint_effusion}
                              </div>
                            </div>
                          </div>
                        )}

                        {interpretation?.bone_marrow && (
                          <div className="finding-card severity-normal" style={{borderLeft: '3px solid #8b5cf6'}}>
                            <div className="finding-header">
                              <div className="finding-level-group">
                                <span className="finding-level">Bone Marrow</span>
                              </div>
                            </div>
                            <div className="finding-body">
                              <div className="finding-row">
                                <span className="finding-label">Signal</span>
                                {interpretation.bone_marrow}
                              </div>
                            </div>
                          </div>
                        )}
                      </React.Fragment>
                    )}

                    {/* ═══ GENERIC / UNKNOWN FINDINGS ═══ */}
                    {anatomyType !== 'spine' && anatomyType !== 'brain' && anatomyType !== 'msk' && (
                      <React.Fragment>
                        <div className="section-header">
                          <div className="section-icon blue">
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#4c8dff" strokeWidth="1.5" strokeLinecap="round">
                              <rect x="2" y="2" width="10" height="10" rx="2"/>
                              <path d="M5 7h4M7 5v4"/>
                            </svg>
                          </div>
                          <div className="section-title">Findings{interpretation?.identified_anatomy ? ` \u2014 ${interpretation.identified_anatomy}` : ''}</div>
                          <div className="section-divider" />
                        </div>

                        {Object.entries(findingsByRegion).length > 0 ? (
                          Object.entries(findingsByRegion).map(([region, text]) => (
                            <div key={region} className="finding-card severity-normal">
                              <div className="finding-header">
                                <div className="finding-level-group">
                                  <span className="finding-level">{region.replace(/_/g, ' ')}</span>
                                </div>
                                <span className="tier-badge tier-b">Tier B</span>
                              </div>
                              <div className="finding-body">
                                <div className="finding-row">
                                  <span className="finding-label">Assessment</span>
                                  {text}
                                </div>
                              </div>
                            </div>
                          ))
                        ) : (
                          <div style={{textAlign: 'center', padding: '48px', color: 'var(--text-muted)'}}>
                            No structured findings available. See impression above.
                          </div>
                        )}
                      </React.Fragment>
                    )}

                    {/* ═══ CONFIDENCE SUMMARY (shared across all anatomy types) ═══ */}
                    {interpretation?.confidence_summary && Object.keys(interpretation.confidence_summary).length > 0 && (
                      <div style={{marginTop: 'var(--s-6)'}}>
                        <div className="section-header">
                          <div className="section-icon" style={{background: 'rgba(139,92,246,0.12)'}}>
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#8b5cf6" strokeWidth="1.5" strokeLinecap="round">
                              <path d="M7 1l1.8 3.6L13 5.3l-3 2.9.7 4.1L7 10.3 3.3 12.3l.7-4.1-3-2.9 4.2-.7z"/>
                            </svg>
                          </div>
                          <div className="section-title">Confidence Summary</div>
                          <div className="section-divider" />
                        </div>
                        <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 'var(--s-3)'}}>
                          {['tier_a', 'tier_b', 'tier_c', 'tier_d'].map(tier => {
                            const items = interpretation.confidence_summary[tier] || [];
                            if (!items.length) return null;
                            const tierLabels = {tier_a: 'Definite', tier_b: 'Probable', tier_c: 'Possible', tier_d: 'Cannot Assess'};
                            const tierColors = {tier_a: '#22d3a0', tier_b: '#4c8dff', tier_c: '#f59e0b', tier_d: '#ef4444'};
                            return (
                              <div key={tier} style={{background: 'var(--glass-bg)', borderRadius: 'var(--r-md)', padding: 'var(--s-4)', border: '1px solid var(--glass-border)'}}>
                                <div style={{display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px'}}>
                                  <span className={`tier-badge tier-${tier.split('_')[1]}`}>Tier {tier.split('_')[1].toUpperCase()}</span>
                                  <span style={{fontSize: '12px', color: 'var(--text-muted)'}}>{tierLabels[tier]}</span>
                                </div>
                                {items.map((item, i) => (
                                  <div key={i} style={{fontSize: '13px', color: 'var(--text-secondary)', padding: '3px 0', borderBottom: i < items.length - 1 ? '1px solid var(--glass-border)' : 'none'}}>
                                    {item}
                                  </div>
                                ))}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}

                    {/* ═══ INCIDENTALS (shared) ═══ */}
                    {interpretation?.incidentals && interpretation.incidentals !== 'None' && interpretation.incidentals !== '' && (
                      <div style={{marginTop: 'var(--s-6)'}}>
                        <div className="section-header">
                          <div className="section-icon" style={{background: 'rgba(245,158,11,0.12)'}}>
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#f59e0b" strokeWidth="1.5" strokeLinecap="round">
                              <path d="M7 1L1 13h12L7 1z"/>
                              <path d="M7 5v4M7 10.5v.5"/>
                            </svg>
                          </div>
                          <div className="section-title">Incidental Findings</div>
                          <div className="section-divider" />
                        </div>
                        <div className="finding-card severity-normal" style={{borderLeft: '3px solid #f59e0b'}}>
                          <div className="finding-body">
                            <div className="finding-row">{interpretation.incidentals}</div>
                          </div>
                        </div>
                      </div>
                    )}

                  </div>
                )}

                {/* Images Tab */}
                {activeTab === 'images' && (
                  <div className="fade-in">
                    <div className="section-header">
                      <div className="section-icon green">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#22d3a0" strokeWidth="1.5" strokeLinecap="round">
                          <rect x="1" y="1" width="12" height="12" rx="2"/>
                          <circle cx="5" cy="5" r="1.5"/>
                          <path d="M1 10l3.5-3.5L7 9l3-3 3 3"/>
                        </svg>
                      </div>
                      <div className="section-title">Annotated Proof Images</div>
                      <div className="section-divider" />
                    </div>

                    {annotated_images && annotated_images.length > 0 ? (
                      <div className="image-gallery">
                        {annotated_images.map(name => (
                          <div key={name} className="image-card"
                               onClick={() => setLightboxImg(`${API_BASE}/api/images/${jobId}/${name}`)}>
                            <img
                              className="image-card-img"
                              src={`${API_BASE}/api/images/${jobId}/${name}`}
                              alt={name}
                              loading="lazy"
                            />
                            <div className="image-card-footer">
                              <span className="image-card-name">{name.replace(/_/g, ' ').replace('.png', '')}</span>
                              <span className="image-card-zoom">Click to enlarge</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div style={{textAlign: 'center', padding: '48px', color: 'var(--text-muted)'}}>
                        No annotated images available
                      </div>
                    )}
                  </div>
                )}

                {/* Study Details Tab */}
                {activeTab === 'details' && (
                  <div className="fade-in">
                    <div className="section-header">
                      <div className="section-icon blue">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#4c8dff" strokeWidth="1.5" strokeLinecap="round">
                          <path d="M7 1v4l2.5 1.5"/>
                          <circle cx="7" cy="7" r="6"/>
                        </svg>
                      </div>
                      <div className="section-title">Patient &amp; Study Details</div>
                      <div className="section-divider" />
                    </div>

                    <table className="demo-table">
                      <tbody>
                        <tr><td>Name</td><td>{demographics?.patient_name?.replace('^', ', ') || 'N/A'}</td></tr>
                        <tr><td>Patient ID</td><td>{demographics?.patient_id || 'N/A'}</td></tr>
                        <tr><td>Age / Sex</td><td>{demographics?.age || '?'} / {demographics?.sex || '?'}</td></tr>
                        <tr><td>Study Date</td><td>{formatDate(demographics?.study_date)}</td></tr>
                        <tr><td>Institution</td><td>{demographics?.institution || 'N/A'}</td></tr>
                        <tr><td>Field Strength</td><td>{demographics?.field_strength ? `${demographics.field_strength}T` : 'N/A'}</td></tr>
                        <tr><td>Contrast</td><td>{measurements?.has_contrast ? 'Yes (Gadolinium)' : 'No'}</td></tr>
                        <tr><td>Anatomy</td><td>{anatomyLabels[anatomyType] || anatomyType}</td></tr>
                        <tr><td>Calibration</td><td>{calibration_status || 'N/A'}</td></tr>
                        <tr><td>AI Model</td><td>{interpretation?.model_used || 'claude-opus-4-6'}</td></tr>
                        {interpretation?.tokens?.input > 0 && (
                          <tr><td>Token Usage</td><td>{interpretation.tokens.input?.toLocaleString()} in / {interpretation.tokens.output?.toLocaleString()} out</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                )}

                {/* Disclaimer */}
                <div className="disclaimer">
                  <strong>Disclaimer:</strong> This analysis was generated using AI-assisted image interpretation
                  as a supplementary diagnostic tool. It does not constitute a formal radiological report and
                  should not replace evaluation by a board-certified radiologist. All findings should be
                  correlated with clinical history and physical examination.
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Mount ──
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
