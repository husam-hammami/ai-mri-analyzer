<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIKA — Understand your medical imaging</title>
  <meta name="description" content="MIKA — From scan to clear answers. Patient-first AI reading of MRI / CT / X-ray scans, every finding shown with certainty and an annotated proof image." />
  <!-- mika-mark (recolorable helix) as favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 56 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%232563EB' stroke-linecap='round'%3E%3Cg opacity='0.4' stroke-width='3'%3E%3Cpath d='M12 24 Q28 15 44 24'/%3E%3Cpath d='M12 40 Q28 31 44 40'/%3E%3Cpath d='M12 56 Q28 47 44 56'/%3E%3C/g%3E%3Cg stroke-width='4'%3E%3Cpath d='M12 24 Q28 33 44 24'/%3E%3Cpath d='M12 40 Q28 49 44 40'/%3E%3Cpath d='M12 56 Q28 65 44 56'/%3E%3C/g%3E%3C/g%3E%3Ccircle cx='28' cy='40' r='4.2' fill='%231D4ED8'/%3E%3C/svg%3E" />

  <!-- Vendored locally so the desktop app runs fully offline (no CDN dependency). -->
  <script src="/assets/vendor/react.production.min.js"></script>
  <script src="/assets/vendor/react-dom.production.min.js"></script>
  <script src="/assets/vendor/babel.min.js"></script>
  <link href="/assets/vendor/dmsans.css" rel="stylesheet" />

  <style>
    /* ══════════════════════════════════════════════════════════════
       MIKA — The One-Body Trilogy design system
       Light canvas · single accent #2563EB · DM Sans · dark navy sidebar
       (brand-migrated per IMPLEMENTATION_PLAN §2.4 — no violet, no tier hues)
       ══════════════════════════════════════════════════════════════ */
    :root {
      /* ── Brand surfaces ── */
      --navy-900:   #0A0F1D;   /* sidebar base */
      --navy-800:   #101B33;   /* sidebar elevated */
      --navy-700:   #16223f;
      --canvas:     #F8FAFC;   /* app canvas */
      --surface:    #FFFFFF;   /* cards */
      --surface-2:  #F1F5F9;   /* sunken */

      /* ── Single accent (the ONLY hue) ── */
      --accent:        #2563EB;
      --accent-strong: #1D4ED8;
      --accent-on-dark:#5B8DEF;   /* same hue, lifted for legibility on deep navy */
      --accent-soft:   rgba(37, 99, 235, 0.10);
      --accent-softer: rgba(37, 99, 235, 0.05);
      --accent-line:   rgba(37, 99, 235, 0.28);
      --accent-glow:   rgba(37, 99, 235, 0.22);

      /* ── Text ── */
      --ink:        #0F172A;   /* primary on light */
      --slate:      #475569;   /* secondary — 7.2:1 on canvas (AA) */
      --slate-300:  #64748B;   /* tertiary / muted — 4.55:1 on canvas (AA); decorative dots use --hairline-dot */
      --hairline-dot: #94A3B8; /* purely-decorative light dots/rings (not text) */
      --on-navy:    #E8EEF9;   /* primary on sidebar */
      --on-navy-dim:#8295b5;   /* muted on sidebar */

      /* ── Hairlines ── */
      --line:        #E5E7EB;
      --line-soft:   #EEF1F5;
      --line-navy:   rgba(255,255,255,0.08);

      /* ── Certainty (single-accent opacity ladder + shape + word) ── */
      --c-confirmed: var(--accent);
      --c-likely:    rgba(37, 99, 235, 0.55);
      --c-possible:  rgba(37, 99, 235, 0.0);  /* hollow ring uses border only */

      /* ── Spacing ── */
      --s-1:4px; --s-2:8px; --s-3:12px; --s-4:16px; --s-5:20px;
      --s-6:24px; --s-8:32px; --s-10:40px; --s-12:48px; --s-16:64px;
      --rail:300px;   /* unified side-rail width across Home/Wait */

      /* ── Radius ── */
      --r-sm:6px; --r-md:10px; --r-lg:12px; --r-xl:16px; --r-full:9999px;

      /* ── Shadow (soft, light-mode) ── */
      --shadow-sm: 0 1px 2px rgba(15,23,42,0.04), 0 1px 3px rgba(15,23,42,0.06);
      --shadow-md: 0 2px 8px rgba(15,23,42,0.06), 0 8px 24px rgba(15,23,42,0.06);
      --shadow-lg: 0 8px 32px rgba(15,23,42,0.10), 0 2px 8px rgba(15,23,42,0.05);

      /* ── Motion ── */
      --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-calm:   cubic-bezier(0.37, 0, 0.63, 1);
      --duration-fast: 150ms; --duration-normal: 250ms; --duration-slow: 420ms;
      --dur-breathe: 4200ms; --dur-scan: 3600ms; --dur-progress: 800ms;
      --stagger-step: 70ms; --draw-marker: 520ms;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { height:100%; scroll-behavior:smooth; overflow:hidden; }
    body {
      font-family:'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--canvas);
      color: var(--ink);
      height:100%;
      min-width:1180px;
      min-height:720px;
      overflow:hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    #root { height:100%; min-height:0; overflow:hidden; }
    ::selection { background: var(--accent); color:#fff; }
    button { font-family:inherit; }
    a { color: inherit; }

    /* ── Reduced-motion contract (NEW per §6.2) ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration:.01ms !important; animation-iteration-count:1 !important;
        transition-duration:.01ms !important; scroll-behavior:auto !important;
      }
    }

    /* ════════════════════ Shell ════════════════════ */
    .shell { display:flex; height:100dvh; min-width:1180px; min-height:720px; overflow:hidden; }

    /* ── Sidebar (dark navy rail) ── */
    .sidebar {
      width: 248px; flex-shrink:0; align-self:stretch;
      background: linear-gradient(180deg, var(--navy-900), var(--navy-800) 60%, var(--navy-900));
      color: var(--on-navy);
      display:flex; flex-direction:column;
      position: sticky; top:0; height:100dvh;
      border-right: 1px solid var(--line-navy);
    }
    .sb-logo {
      position:relative; padding: var(--s-5) var(--s-5) var(--s-4);
      border-bottom: 1px solid var(--line-navy);
    }
    .sb-logo img {
      width:100%; display:block;
      /* merge the dark lockup into the navy rail: 'lighten' drops its dark bg into the sidebar,
         leaving only the bright metallic helix + wordmark; the mask feathers any residual edge. */
      mix-blend-mode: lighten;
      -webkit-mask-image: radial-gradient(125% 130% at 50% 45%, #000 58%, transparent 100%);
      mask-image: radial-gradient(125% 130% at 50% 45%, #000 58%, transparent 100%);
    }
    .sb-nav { padding: var(--s-4) var(--s-3); display:flex; flex-direction:column; gap:2px; }
    .sb-item {
      display:flex; align-items:center; gap: var(--s-3);
      padding: 10px 12px; border-radius: var(--r-sm);
      color: var(--on-navy-dim); font-size:13.5px; font-weight:500;
      background:transparent; border:none; width:100%; text-align:left; cursor:pointer;
      transition: background var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out);
    }
    .sb-item:hover { color: var(--on-navy); background: rgba(255,255,255,0.04); }
    .sb-item.active { color:#fff; background: rgba(37,99,235,0.18); box-shadow: inset 0 0 0 1px var(--accent-line); }
    .sb-item.active .sb-ico { color: var(--accent); }
    .sb-item.soon { opacity:.5; cursor:default; }
    .sb-item.soon:hover { background:transparent; color:var(--on-navy-dim); }
    .sb-ico { width:17px; height:17px; flex-shrink:0; display:flex; }
    .sb-soon-tag { margin-left:auto; font-size:9.5px; letter-spacing:.4px; text-transform:uppercase; color: var(--on-navy-dim); }
    .sb-spacer { flex:1; }
    .sb-foot { padding: var(--s-4) var(--s-4) var(--s-5); border-top:1px solid var(--line-navy); }
    .sb-reassure {
      background: rgba(255,255,255,0.04); border:1px solid var(--line-navy);
      border-radius: var(--r-md); padding: var(--s-3) var(--s-4); margin-bottom: var(--s-4);
    }
    .sb-reassure-t { font-size:12.5px; font-weight:600; color: var(--on-navy); margin-bottom:4px; }
    .sb-reassure-b { font-size:11.5px; line-height:1.55; color: var(--on-navy-dim); }
    .sb-privacy { display:flex; gap:10px; align-items:flex-start; margin-bottom: var(--s-3); }
    .sb-privacy svg { width:16px; height:16px; flex-shrink:0; color: var(--accent); margin-top:1px; }
    .sb-privacy-t { font-size:12px; font-weight:600; color: var(--on-navy); }
    .sb-privacy-b { font-size:11px; line-height:1.5; color: var(--on-navy-dim); }
    .sb-link { background:none; border:none; color: var(--on-navy-dim); font-size:12px; cursor:pointer; padding:6px 0; text-decoration:none; display:inline-flex; gap:6px; align-items:center; }
    .sb-link:hover { color: var(--on-navy); }
    /* Connection to the user's own Claude subscription — the one sign-in MIKA needs. */
    .sb-conn { display:flex; align-items:center; gap:8px; width:100%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.10);
               border-radius: var(--r-md); padding:8px 10px; margin-bottom: var(--s-3); cursor:pointer; text-align:left; transition: background var(--duration-fast) var(--ease-out); }
    .sb-conn:hover { background:rgba(255,255,255,.08); }
    .sb-conn-dot { width:8px; height:8px; border-radius:50%; background:#f59e0b; box-shadow:0 0 0 3px rgba(245,158,11,.18); flex-shrink:0; }
    .sb-conn-dot.ok { background:#10b981; box-shadow:0 0 0 3px rgba(16,185,129,.18); }
    .sb-conn-txt { font-size:11.5px; font-weight:600; color: var(--on-navy-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .sb-conn.ok .sb-conn-txt { color: var(--on-navy); }

    /* ── Canvas ── */
    .canvas { flex:1; min-width:0; min-height:0; overflow:hidden; display:flex; flex-direction:column; background: var(--canvas); }
    .topbar {
      height:60px; flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
      padding: 0 var(--s-8); background: var(--surface); border-bottom:1px solid var(--line);
      position:sticky; top:0; z-index:30;
    }
    .topbar-l { display:flex; align-items:center; gap: var(--s-4); min-width:0; }
    .topbar-l.stacked { flex-direction:column; align-items:flex-start; justify-content:center; gap:2px; }
    .topbar-title { font-size:14.5px; font-weight:600; color: var(--ink); white-space:nowrap; }
    .topbar-meta { font-size:13px; color: var(--slate-300); display:flex; align-items:center; gap:8px; }
    .topbar-r { display:flex; align-items:center; gap: var(--s-3); }
    .conn-pill { display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:500; color: var(--slate); padding:6px 12px; border-radius: var(--r-full); border:1px solid var(--line); background: var(--surface-2); }
    .conn-dot { width:7px; height:7px; border-radius:50%; background:#10b981; box-shadow:0 0 0 3px rgba(16,185,129,.15); }
    .conn-dot.off { background: var(--slate-300); box-shadow:none; }
    .page { flex:1; min-height:0; overflow:hidden; overscroll-behavior:contain; }
    /* Fluid: fill the full content width at ANY browser zoom (no max-width cap → no empty side rails
       when zoomed out). Top-aligned; pages scroll naturally when content is tall. */
    .page-inner { width:100%; height:100%; min-height:0; margin:0; padding: var(--s-8) var(--s-10); overflow:hidden; }
    .page-route { overflow:auto; }

    /* ── Buttons ── */
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; font-size:13.5px; font-weight:600;
      padding:10px 18px; border-radius: var(--r-md); cursor:pointer; border:1px solid transparent;
      transition: transform var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out); }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--accent); color:#fff; box-shadow: 0 1px 2px rgba(37,99,235,.22), 0 4px 10px rgba(37,99,235,.14); }
    .btn-primary:hover { background: var(--accent-strong); }
    .btn-ghost { background: var(--surface); color: var(--slate); border-color: var(--line); }
    .btn-ghost:hover { border-color: var(--accent-line); color: var(--accent); }
    .btn[disabled] { opacity:.55; cursor:default; }
    .btn-sm { padding:7px 13px; font-size:12.5px; }

    /* ── Certainty chip (word + accent-opacity + shape) ── */
    .cchip { display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600; padding:3px 10px 3px 8px; border-radius: var(--r-full); letter-spacing:.1px; }
    .cchip .glyph { width:10px; height:10px; flex-shrink:0; }
    .cchip.confirmed { color:#fff; background: var(--accent); }
    .cchip.likely { color: var(--accent-strong); background: var(--accent-soft); box-shadow: inset 0 0 0 1px var(--accent-line); }
    .cchip.possible { color: var(--slate); background: var(--surface); box-shadow: inset 0 0 0 1px var(--line); }

    /* ── Overall confidence pill ── */
    .opill { display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:600; padding:6px 14px; border-radius: var(--r-full); }
    .opill .dot { width:8px; height:8px; border-radius:50%; }
    .opill.high { color: var(--accent-strong); background: var(--accent-soft); box-shadow: inset 0 0 0 1px var(--accent-line); }
    .opill.high .dot { background: var(--accent); }
    .opill.moderate { color: var(--slate); background: var(--surface-2); box-shadow: inset 0 0 0 1px var(--line); }
    .opill.moderate .dot { background: var(--slate); }
    .opill.low { color: var(--slate); background: var(--surface-2); box-shadow: inset 0 0 0 1px var(--line); }
    .opill.low .dot { background: var(--slate-300); }

    /* ════════════════════ Body figure (one instance, 3 states) ════════════════════ */
    .bodyfig {
      position:relative; width:100%; max-width:var(--bodyfig-max, 520px); margin:0 auto;
      --bodyfig-zoom:1; --bodyfig-y:0px; --bodyfig-origin-y:50%;
    }
    .bodyfig-stage {
      position:relative; width:100%; aspect-ratio: 880 / 1375;
      transform: translateY(var(--bodyfig-y)) scale(var(--bodyfig-zoom));
      transform-origin:center var(--bodyfig-origin-y);
    }
    .bodyfig-stage > picture, .bodyfig-stage img.bf-img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; }
    .bodyfig-stage img.bf-img { display:block; }
    .bf-empty { display:flex; align-items:center; justify-content:center; height:100%; color: var(--slate-300); font-size:13px; text-align:center; padding:24px; }
    /* Home: gentle region glow on the lit spine */
    .bf-glow {
      position:absolute; left:50%; top:43%; width:24%; height:14%; transform:translate(-50%,-50%);
      border-radius:50%; background: radial-gradient(closest-side, var(--accent-glow), transparent 75%);
      filter: blur(2px); opacity:0; pointer-events:none;
    }
    .state-home .bf-glow { opacity:.7; animation: regionGlow var(--dur-breathe) var(--ease-calm) infinite; }
    @keyframes regionGlow { 0%,100% { opacity:.55; transform:translate(-50%,-50%) scale(0.96);} 50% { opacity:.85; transform:translate(-50%,-50%) scale(1.06);} }

    /* Wait: one calm scan-band sweeping the active region */
    .bf-scan { position:absolute; left:18%; right:18%; height:8%; top:0; pointer-events:none;
      background: linear-gradient(180deg, transparent, var(--accent-glow) 45%, rgba(37,99,235,.45) 50%, var(--accent-glow) 55%, transparent);
      filter: blur(1px); opacity:0; border-radius:40%; }
    .state-wait .bf-scan { opacity:.9; animation: scanSweep var(--dur-scan) var(--ease-calm) infinite; }
    @keyframes scanSweep { 0% { top:30%; opacity:.2;} 25%{opacity:.95;} 50% { top:60%; opacity:.95;} 75%{opacity:.95;} 100% { top:30%; opacity:.2;} }
    /* whole-figure faint glow when anatomy unknown (honest, region-agnostic) */
    .bf-scan.diffuse { left:30%; right:30%; height:30%; top:35%; opacity:.4; filter: blur(8px); animation: diffuseBreathe var(--dur-breathe) var(--ease-calm) infinite; }
    @keyframes diffuseBreathe { 0%,100%{opacity:.3;} 50%{opacity:.55;} }
    /* focused scan-glow at the region the read is actually inspecting (agent-reported) */
    .bf-focus { position:absolute; left:0; right:0; height:0; pointer-events:none; }
    /* bright white-cored band so it reads against the spine's own blue glow */
    .bf-focus-line { position:absolute; left:12%; right:12%; top:0; height:2px; transform:translateY(-50%);
      background: linear-gradient(90deg, transparent, #ffffff 50%, transparent); border-radius:2px;
      box-shadow: 0 0 6px 1px #fff, 0 0 20px 4px var(--accent); animation: focusPulse 2.0s var(--ease-calm) infinite; }
    /* inward end-ticks frame the level under review */
    .bf-focus-line::before, .bf-focus-line::after { content:''; position:absolute; top:-5px; width:2px; height:12px; background:#fff; box-shadow:0 0 8px var(--accent); }
    .bf-focus-line::before { left:0; } .bf-focus-line::after { right:0; }
    .bf-focus-glow { position:absolute; top:0; width:30%; height:58px; transform:translate(-50%,-50%); border-radius:50%;
      background: radial-gradient(closest-side, rgba(180,210,255,.6), transparent 72%); filter: blur(2px);
      animation: focusPulse 2.0s var(--ease-calm) infinite; }
    @keyframes focusPulse { 0%,100%{ opacity:.6; } 50%{ opacity:1; } }

    /* Read: precise dot on the level + numbered label in the margin on a leader (radiology-style) */
    .bf-markers { position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
    .mk { cursor:pointer; }
    .mk-leader { fill:none; stroke: var(--accent-line); stroke-width:0.55; }
    .mk-halo { fill: var(--accent); opacity:0; transition: opacity var(--duration-fast) var(--ease-out); }
    .mk-dot { fill:#fff; stroke: var(--accent); stroke-width:1.1; }
    .mk-chip { fill: var(--accent); stroke:#fff; stroke-width:0.7; }
    .mk-num { fill:#fff; font-family:'DM Sans', sans-serif; }
    .mk.likely .mk-dot { stroke: rgba(37,99,235,0.7); }
    .mk.likely .mk-chip { fill: rgba(37,99,235,0.62); }
    .mk.possible .mk-dot { stroke: var(--accent); }
    .mk.possible .mk-chip { fill:#fff; stroke: var(--accent); stroke-width:1; }
    .mk.possible .mk-num { fill: var(--accent-strong); }
    .mk:hover .mk-halo, .mk.active .mk-halo { opacity:0.22; }
    .mk.active .mk-leader { stroke: var(--accent); stroke-width:0.9; }
    .mk.active .mk-chip { stroke: var(--accent-strong); stroke-width:1.4; }

    /* ════════════════════ HOME ════════════════════ */
    .home-grid { position:relative; display:grid; grid-template-columns: minmax(420px,1fr) minmax(230px,0.55fr) 260px; gap: var(--s-8); align-items:stretch; flex:1; }
    .page-home { display:flex; flex-direction:column; }
    .page-home .home-grid { min-height:0; }
    /* each column centers its content vertically in the now-equal-height row → slack becomes balanced
       top/bottom breathing room instead of one big void under the shortest column */
    .home-hero { display:flex; flex-direction:column; justify-content:center; gap: var(--s-4); max-width:560px; }
    .home-body { display:flex; flex-direction:column; justify-content:center; }
    .home-body .bodyfig { --bodyfig-max:330px; }
    .coverage { display:flex; flex-direction:column; justify-content:center; opacity:.9; }
    .home-leaders { position:absolute; inset:0; pointer-events:none; z-index:5; overflow:visible; }
    .leader-path { fill:none; stroke: var(--accent-line); stroke-width:1; }
    .leader-cap { fill: var(--accent); }
    @media (max-width:1180px){ .home-leaders{ display:none; } }
    .home-hero-pretitle { font-size:12px; font-weight:600; letter-spacing:.6px; text-transform:uppercase; color: var(--accent); margin-bottom: var(--s-4); }
    .home-title { font-size:42px; line-height:1.08; font-weight:700; letter-spacing:-1.2px; color: var(--ink); margin-bottom: var(--s-5); }
    .home-title .accent { color: var(--accent); }
    .home-sub { font-size:15.5px; line-height:1.55; color: var(--slate); max-width:460px; margin-bottom: var(--s-5); }
    /* Secondary intake rail — a second way to START (lab) + PICK UP (chat), under the dropzone. */
    .intake-more { display:flex; gap: var(--s-3); margin-top: var(--s-4); }
    .intake-alt { flex:1 1 0; min-width:0; display:flex; align-items:center; gap:11px; text-align:start;
      padding:11px 13px; border-radius: var(--r-md); border:1px solid var(--line); background: var(--surface);
      cursor:pointer; transition: border-color .15s, background .15s; font:inherit; }
    .intake-alt:hover { border-color: var(--accent-line); background: var(--surface-2); }
    .intake-alt .ia-ico { width:34px; height:34px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
      border-radius: var(--r-sm); background: var(--accent-soft); color: var(--accent-strong); }
    .intake-alt .ia-txt { display:flex; flex-direction:column; gap:1px; min-width:0; }
    .intake-alt .ia-t { font-size:13px; font-weight:700; color: var(--ink); letter-spacing:-.2px; }
    .intake-alt .ia-s { font-size:11px; line-height:1.3; color: var(--slate); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .intake-alt .ia-arr { margin-inline-start:auto; flex-shrink:0; color: var(--slate-300); display:flex; }
    [dir="rtl"] .intake-alt .ia-arr svg { transform: scaleX(-1); }
    @media (max-width: 600px) { .intake-more { flex-wrap:wrap; } .intake-alt { flex-basis:100%; } }

    .dropzone { background: var(--surface); border:1.5px dashed var(--line); border-radius: var(--r-lg);
      padding: var(--s-7); text-align:center; min-height:252px; display:flex; flex-direction:column; justify-content:center;
      transition: border-color var(--duration-normal) var(--ease-out), background var(--duration-normal) var(--ease-out), box-shadow var(--duration-normal) var(--ease-out); }
    .dropzone.over { border-color: var(--accent); border-style:solid; background: var(--accent-softer); box-shadow: 0 0 0 4px var(--accent-glow); }
    .dropzone.ready { border-style:solid; border-color: var(--accent-line); }
    .dz-ico { width:44px; height:44px; margin:0 auto var(--s-4); color: var(--accent); display:flex; align-items:center; justify-content:center; background: var(--accent-soft); border-radius: var(--r-md); }
    .dz-title { font-size:16px; font-weight:600; color: var(--ink); margin-bottom:4px; }
    .dz-sub { font-size:13px; color: var(--slate-300); margin-bottom: var(--s-5); }
    .dz-actions { display:flex; gap: var(--s-3); justify-content:center; flex-wrap:wrap; }
    .dz-chips { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-top: var(--s-5); }
    .chip { font-size:11px; font-weight:500; color: var(--slate); background: var(--surface-2); border:1px solid var(--line); padding:4px 10px; border-radius: var(--r-full); }
    .chip.modality { color: var(--accent-strong); background: var(--accent-soft); border-color: var(--accent-line); }
    .dz-meta { margin-top: var(--s-5); padding-top: var(--s-5); border-top:1px solid var(--line-soft); }
    .dz-ready-row { display:flex; align-items:center; gap:10px; justify-content:center; font-size:13.5px; color: var(--ink); font-weight:500; margin-bottom: var(--s-4); }
    .dz-ready-row .ok { width:18px; height:18px; color: var(--accent); }
    .field-label { display:block; font-size:12px; font-weight:600; color: var(--slate); margin: var(--s-4) 0 6px; text-align:left; }
    .field { width:100%; border:1px solid var(--line); border-radius: var(--r-md); padding:10px 12px; font-size:13.5px; font-family:inherit; color: var(--ink); resize:vertical; background: var(--surface); }
    .field:focus { outline:none; border-color: var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }

    .home-body { position:relative; }
    .home-body .bf-foot { text-align:center; font-size:11px; color: var(--slate-300); margin-top: var(--s-3); }

    /* coverage rail */
    .coverage { }
    .cov-title { font-size:11px; font-weight:600; letter-spacing:.6px; text-transform:uppercase; color: var(--slate-300); margin-bottom: var(--s-4); }
    .cov-list { display:flex; flex-direction:column; gap: var(--s-1); }
    .cov-row { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius: var(--r-sm); }
    .cov-row .cov-ico { width:18px; height:18px; color: var(--slate); flex-shrink:0; display:flex; }
    .cov-row .cov-name { font-size:13px; color: var(--ink); font-weight:500; }
    .cov-row .cov-dot { margin-left:auto; width:8px; height:8px; border-radius:50%; }
    .cov-dot.can { background: var(--accent); }
    .cov-dot.soon { background:transparent; box-shadow: inset 0 0 0 1.5px var(--slate-300); }
    .cov-row.soon .cov-name, .cov-row.soon .cov-ico { color: var(--slate-300); }
    .cov-legend { display:flex; gap: var(--s-4); margin-top: var(--s-4); padding-top: var(--s-4); border-top:1px solid var(--line-soft); font-size:11.5px; color: var(--slate); }
    .cov-legend span { display:inline-flex; align-items:center; gap:6px; }
    .cov-legend .ld { width:8px; height:8px; border-radius:50%; }

    /* trust strip */
    .trust { display:grid; grid-template-columns: repeat(4, 1fr); gap: var(--s-6); margin-top: var(--s-12); padding-top: var(--s-8); border-top:1px solid var(--line); }
    .trust-item { display:flex; gap: var(--s-3); }
    .trust-item .ti-ico { width:22px; height:22px; color: var(--accent); flex-shrink:0; }
    .trust-item .ti-t { font-size:13px; font-weight:600; color: var(--ink); margin-bottom:3px; }
    .trust-item .ti-b { font-size:12px; line-height:1.5; color: var(--slate); }
    .page-foot { text-align:center; font-size:11.5px; color: var(--slate-300); margin-top: var(--s-10); }

    /* ════════════════════ WAIT ════════════════════ */
    /* status+slice viewer | body figure (tallest hero) | sequences + latest view — columns share one height */
    .wait-grid { display:grid; grid-template-columns: minmax(0,1fr) minmax(340px,0.9fr) 290px; gap: var(--s-7); align-items:stretch; }
    .page-wait { display:flex; flex-direction:column; }
    .page-wait .wait-grid { min-height:0; flex:1; }
    .page-wait .wait-left, .page-wait .wait-right { min-height:0; overflow:auto; overscroll-behavior:contain; scrollbar-gutter:stable; }
    .page-wait .wait-body { min-height:0; overflow:hidden; }
    .wait-left { display:flex; flex-direction:column; }
    /* the slice viewer grows to fill the column (no dead gap above the docked reassurance) and shows
       a larger slice; the stage drops its fixed 4/3 ratio so the real slice fills the taller box. */
    .page-wait .wait-left .reading-viewer { flex:1 1 auto; min-height:0; display:flex; }
    .page-wait .wait-left .rv-stage { height:100%; aspect-ratio:auto; flex:1; }
    .wait-left .safe-leave { margin-top: var(--s-3); }
    .wait-body { display:flex; align-items:center; justify-content:center; }
    /* figure-as-hero: fill the column HEIGHT (aspect-correct → no top/bottom void). max-width:100%
       escapes the small per-state inline cap; the small symmetric side void reads as intentional. */
    .wait-body .bodyfig { width:100%; height:100%; max-width:100%; display:flex; align-items:center; justify-content:center; }
    .wait-body .bodyfig-stage { height:100%; width:auto; max-width:100%; }
    .wait-right { display:flex; flex-direction:column; }
    .wait-heading { font-size:26px; line-height:1.3; font-weight:700; letter-spacing:-0.5px; color: var(--ink); max-width:440px; margin-bottom: var(--s-3); }
    .wait-facts { display:grid; grid-template-columns: repeat(4, minmax(86px, max-content)); gap: var(--s-2); margin-bottom: var(--s-6); }
    .wait-fact { display:flex; flex-direction:column; gap:2px; padding:8px 10px; background: var(--surface); border:1px solid var(--line); border-radius: var(--r-sm); }
    .wait-fact-label { font-size:10px; line-height:1.2; font-weight:700; letter-spacing:.55px; text-transform:uppercase; color: var(--slate-300); }
    .wait-fact-value { font-size:13px; line-height:1.25; font-weight:650; color: var(--ink); white-space:nowrap; }
    .phase-list { display:flex; flex-direction:column; gap: var(--s-2); }
    .phase { display:flex; gap: var(--s-3); padding:10px 0; }
    .phase-dot { width:22px; height:22px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; border:2px solid var(--line); background: var(--surface); margin-top:1px; }
    .phase-dot svg { width:12px; height:12px; }
    .phase.done .phase-dot { background: var(--accent); border-color: var(--accent); color:#fff; }
    .phase.active .phase-dot { border-color: var(--accent); }
    .phase.active .phase-dot .pulse { width:8px; height:8px; border-radius:50%; background: var(--accent); animation: dotPulse 1.6s var(--ease-calm) infinite; }
    @keyframes dotPulse { 0%,100%{transform:scale(0.8);opacity:.7;} 50%{transform:scale(1.25);opacity:1;} }
    .phase-t { font-size:14px; font-weight:600; color: var(--ink); }
    .phase.pending .phase-t { color: var(--slate-300); }
    .phase.pending .phase-b { color: var(--slate-300); }
    .phase-b { font-size:12.5px; line-height:1.5; color: var(--slate); margin-top:2px; }
    /* visual stepper (patient-facing, icon-driven; minimal text) */
    .stepper { position:relative; display:flex; justify-content:space-between; align-items:flex-start; max-width:460px; margin: var(--s-5) 0 var(--s-4); }
    .stepper-track { position:absolute; top:24px; left:24px; right:24px; height:3px; border-radius:2px; background: var(--line); overflow:hidden; }
    .stepper-fill { height:100%; border-radius:2px; background: linear-gradient(90deg, var(--accent), var(--accent-strong)); transition: width var(--dur-progress) var(--ease-out); }
    .step { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:9px; flex:1; }
    .step-node { width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; background: var(--surface); border:2px solid var(--line); color: var(--slate-300); transition: color var(--duration-normal) var(--ease-out), border-color var(--duration-normal) var(--ease-out), background var(--duration-normal) var(--ease-out), box-shadow var(--duration-normal) var(--ease-out); }
    .step.done .step-node { background: var(--accent); border-color: var(--accent); color:#fff; }
    .step.active .step-node { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 0 5px var(--accent-glow); animation: stepPulse 2s var(--ease-calm) infinite; }
    @keyframes stepPulse { 0%,100%{ box-shadow:0 0 0 4px var(--accent-glow);} 50%{ box-shadow:0 0 0 9px var(--accent-softer);} }
    .step-label { font-size:12.5px; font-weight:600; color: var(--slate-300); }
    .step.done .step-label { color: var(--slate); }
    .step.active .step-label { color: var(--accent-strong); }
    .wait-live { min-height:20px; max-width:460px; font-size:13.5px; font-weight:650; color: var(--accent-strong); margin-bottom: var(--s-3); padding:9px 11px; background:var(--accent-soft); border:1px solid var(--accent-line); border-radius:var(--r-sm); }
    /* cinematic slice viewer — real study images being read (scanner-style frame) */
    .reading-viewer { width:100%; max-width:430px; margin: var(--s-2) 0 var(--s-4); }
    .rv-stage { position:relative; aspect-ratio:4/3; border-radius:14px; overflow:hidden; background:#04070e;
      box-shadow: 0 10px 34px rgba(37,99,235,.20), inset 0 0 0 1px var(--accent-line); }
    .rv-slice { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; opacity:0; transform: scale(1.0); transition: opacity 1300ms var(--ease-out); filter: contrast(1.06) brightness(1.02); will-change: opacity, transform; }
    .rv-slice.on { opacity:1; animation: rvKen 6000ms var(--ease-out) both; }   /* slow Ken-Burns zoom on the slice being read */
    @keyframes rvKen { from { transform: scale(1.0); } to { transform: scale(1.07); } }
    .rv-grid { position:absolute; inset:0; pointer-events:none; opacity:.10;
      background-image: linear-gradient(var(--accent) 1px, transparent 1px), linear-gradient(90deg, var(--accent) 1px, transparent 1px);
      background-size: 30px 30px; }
    .rv-scan { position:absolute; left:0; right:0; top:0; height:2px; background: linear-gradient(90deg, transparent, #7cb0ff, transparent);
      box-shadow: 0 0 16px 2px var(--accent-glow); animation: rvScan 4.8s var(--ease-calm) infinite; }
    @keyframes rvScan { 0%{ top:0; opacity:.25;} 12%{opacity:1;} 88%{opacity:1;} 100%{ top:100%; opacity:.25;} }
    .rv-bk { position:absolute; width:18px; height:18px; border:2px solid var(--accent); opacity:.85; }
    .rv-bk.tl { top:12px; left:12px; border-right:0; border-bottom:0; border-top-left-radius:4px; }
    .rv-bk.tr { top:12px; right:12px; border-left:0; border-bottom:0; border-top-right-radius:4px; }
    .rv-bk.bl { bottom:12px; left:12px; border-right:0; border-top:0; border-bottom-left-radius:4px; }
    .rv-bk.br { bottom:12px; right:12px; border-left:0; border-top:0; border-bottom-right-radius:4px; }
    .rv-hud { position:absolute; top:14px; left:38px; right:38px; display:flex; align-items:center; gap:10px; }
    .rv-tag { font-size:10px; font-weight:700; letter-spacing:1.6px; color:#fff; background: var(--accent); padding:4px 8px; border-radius:4px; }
    .rv-meta { font-family: ui-monospace, 'Cascadia Code', Consolas, monospace; font-size:10.5px; letter-spacing:.8px; color:#a8c8ff; }
    .safe-leave { display:flex; gap:10px; align-items:center; margin-top: var(--s-4); padding: var(--s-3); background: var(--surface); border:1px solid var(--line); border-radius: var(--r-md); font-size:12.5px; line-height:1.45; color: var(--slate); font-weight:500; }
    .safe-leave svg { width:18px; height:18px; flex-shrink:0; }

    .seq-panel { }
    .seq-title { font-size:11px; font-weight:600; letter-spacing:.6px; text-transform:uppercase; color: var(--slate-300); margin-bottom: var(--s-4); }
    .seq-row { display:flex; align-items:center; gap: var(--s-3); padding:10px; border:1px solid var(--line); border-radius: var(--r-md); margin-bottom:8px; background: var(--surface); transition: border-color var(--duration-normal) var(--ease-out), box-shadow var(--duration-normal) var(--ease-out); }
    .seq-row.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .seq-active-dot { margin-left:auto; width:9px; height:9px; border-radius:50%; background: var(--accent); animation: dotPulse 1.4s var(--ease-calm) infinite; }
    .seq-thumb { position:relative; width:52px; height:52px; border-radius:8px; background: var(--navy-900); flex-shrink:0; display:flex; align-items:center; justify-content:center; color: var(--accent); overflow:hidden; }
    .seq-thumb svg { width:24px; height:24px; opacity:.7; }
    .seq-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .seq-thumb.scanning { box-shadow: inset 0 0 0 1.5px var(--accent); }
    /* the "analyzing" motion: a scan-line sweeps the active slice */
    .seq-scanline { position:absolute; left:0; right:0; top:0; height:2px; background: linear-gradient(90deg, transparent, var(--accent-bright,#60a5fa), transparent); box-shadow:0 0 8px 1px var(--accent); animation: seqScan 1.7s var(--ease-calm) infinite; }
    @keyframes seqScan { 0%{ top:0; opacity:0;} 12%{opacity:1;} 88%{opacity:1;} 100%{ top:100%; opacity:0;} }
    .seq-name { font-size:13px; font-weight:600; color: var(--ink); }
    .seq-meta { font-size:11.5px; color: var(--slate-300); margin-top:1px; }
    .seq-check { margin-left:auto; color: var(--accent); width:18px; height:18px; }
    .seq-placeholder { font-size:12.5px; line-height:1.55; color: var(--slate-300); padding: var(--s-4); border:1px dashed var(--line); border-radius: var(--r-md); text-align:center; }
    /* latest annotated view — flex-fills the rail between the sequence list and the progress block */
    .wait-latest { flex:1 1 0; display:flex; flex-direction:column; min-height:0; margin: var(--s-5) 0; }
    .wait-latest-t { font-size:11px; font-weight:600; letter-spacing:.6px; text-transform:uppercase; color: var(--slate-300); margin-bottom: var(--s-3); }
    /* flex-basis:0 + min-height:0 so the (tall) level-map image fills the leftover rail space WITHOUT
       leaking its natural height into the column-height calc (which was forcing scroll + figure gaps). */
    .wait-latest-img { flex:1 1 0; min-height:0; position:relative; border-radius: var(--r-md); overflow:hidden; background: var(--navy-900); box-shadow: inset 0 0 0 1px var(--accent-line); }
    .wait-latest-img img { width:100%; height:100%; object-fit:contain; display:block; }
    .wait-latest-scan { position:absolute; left:0; right:0; top:0; height:2px; background: linear-gradient(90deg, transparent, #60a5fa, transparent); box-shadow:0 0 8px 1px var(--accent); animation: seqScan 2.6s var(--ease-calm) infinite; }
    .progress-block { margin-top: var(--s-4); padding: var(--s-4); background:var(--surface); border:1px solid var(--line); border-radius:var(--r-md); }
    .progress-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
    .progress-head .ph-l { font-size:13px; font-weight:600; color: var(--ink); }
    .progress-head .ph-r { font-size:13px; font-weight:700; color: var(--accent); }
    .pbar { height:8px; border-radius: var(--r-full); background: var(--surface-2); overflow:hidden; box-shadow: inset 0 0 0 1px var(--line); }
    .pbar-fill { height:100%; border-radius: var(--r-full); background: linear-gradient(90deg, var(--accent), var(--accent-strong)); transition: width var(--dur-progress) var(--ease-out); }
    .progress-eta { display:flex; align-items:center; gap:7px; font-size:13px; color: var(--slate); margin-top:10px; }
    .progress-eta svg { width:15px; height:15px; color: var(--accent); flex-shrink:0; }
    .progress-eta strong { color: var(--ink); font-weight:700; }

    /* ════════════════════ READ ════════════════════ */
    .read-head { margin-bottom: var(--s-5); }
    .read-bottom-line { font-size:25px; line-height:1.25; font-weight:700; letter-spacing:-0.6px; color: var(--ink); max-width:820px; margin-bottom: var(--s-3); }
    .read-bottom-line .quiet { color: var(--slate); font-weight:600; font-size:20px; display:block; margin-top:10px; letter-spacing:-0.3px; }
    /* Natural top-aligned columns; the page scrolls if content is tall. Figure sits at a comfortable
       fixed size (no height-fill gymnastics). */
    .read-grid { display:grid; grid-template-columns: minmax(0,1.12fr) minmax(0,0.88fr); gap: var(--s-10); align-items:start; }
    .page-read { display:grid; grid-template-rows:auto auto minmax(0,1fr) auto; row-gap: var(--s-4); padding-top: var(--s-4); }
    .page-read .read-head { margin-bottom:0; }
    .page-read .read-grid { min-height:0; overflow:hidden; align-items:stretch; }
    .page-read .read-left { min-height:0; overflow:auto; overscroll-behavior:contain; scrollbar-gutter:stable; padding-right: var(--s-2); }
    .page-read .read-right { min-height:0; overscroll-behavior:contain; }
    .page-read .read-right.proof-right { overflow:hidden; }
    .page-read .read-right.clinician-right { overflow:auto; scrollbar-gutter:stable; padding-right: var(--s-2); }
    .page-read .read-right > * { min-width:0; }
    .page-read .read-right.proof-right .proof { height:100%; min-height:0; overflow:hidden; display:flex; flex-direction:column; }
    .page-read .read-right.proof-right .proof-head,
    .page-read .read-right.proof-right .proof-cap { flex-shrink:0; }
    .page-read .read-right.proof-right .proof-img-wrap { flex:1 1 auto; min-height:0; overflow:auto; }
    /* width-led: the proof fills the card width at its natural ratio (was height:100% → shrank tiny) */
    .page-read .read-right.proof-right .proof-img-wrap img { width:100%; height:auto; max-height:none; object-fit:contain; }
    .page-read .thread .read-wtm,
    .page-read .thread > .sec-block,
    .page-read .thread .clin-link { margin-top: var(--s-3); }
    .page-read .thread .read-wtm { padding: var(--s-3) var(--s-4); }
    .page-read .thread .read-wtm h4 { margin-bottom: var(--s-2); }
    .page-read .thread .read-wtm li { font-size:12.5px; line-height:1.45; }
    .read-grid.empty-read-grid { grid-template-columns:minmax(520px,0.96fr) minmax(320px,0.54fr); gap:var(--s-8); }
    .read-figwrap { display:grid; grid-template-columns: minmax(0,0.82fr) minmax(0,1fr); gap: var(--s-6); align-items:start; }
    .read-left .bodyfig { --bodyfig-max:340px; margin:0 auto; }
    .thread { display:flex; flex-direction:column; gap: var(--s-2); }
    .thread-title { font-size:11px; font-weight:600; letter-spacing:.6px; text-transform:uppercase; color: var(--slate-300); margin-bottom: var(--s-2); }
    .frow { width:100%; text-align:left; background: var(--surface); border:1px solid var(--line); border-radius: var(--r-md); padding: var(--s-3) var(--s-4); cursor:pointer;
      transition: border-color var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out), transform var(--duration-fast) var(--ease-out); }
    .frow:hover { border-color: var(--accent-line); }
    .frow.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .frow-top { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .frow-num { width:22px; height:22px; border-radius:50%; background: var(--surface-2); color: var(--slate); font-size:11.5px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow: inset 0 0 0 1px var(--line); }
    .frow.active .frow-num { background: var(--accent); color:#fff; box-shadow:none; }
    .frow-plain { font-size:14px; font-weight:600; color: var(--ink); line-height:1.4; }
    .frow-cap { font-size:12.5px; color: var(--slate); line-height:1.5; margin-top:4px; }
    .frow-extra { margin-top:10px; padding-top:10px; border-top:1px solid var(--line-soft); }
    .frow-extra h4 { font-size:12px; font-weight:700; color:var(--accent-strong); margin-bottom:7px; }
    .frow-extra .sec-block li { font-size:12.5px; line-height:1.45; }
    .legend-row { display:flex; gap: var(--s-5); margin-top: var(--s-4); font-size:12px; color: var(--slate); }
    .legend-row span { display:inline-flex; align-items:center; gap:6px; }

    /* ── Lab report — "The Verdict" ── */
    .num { unicode-bidi: isolate; font-variant-numeric: tabular-nums; }
    .page-lab-home { max-width:640px; margin-inline:auto; padding-top: var(--s-6); }
    .lab-home-head { margin-bottom: var(--s-5); text-align:center; }
    .page-lab-home .home-title { font-size:26px; font-weight:700; color: var(--ink); margin-bottom: var(--s-3); }
    .page-lab-home .home-sub { margin-inline:auto; text-align:center; }
    .page-lab-read { padding-top: var(--s-4); }
    .page-lab-read > * + * { margin-top: var(--s-6); }

    .lab-verdict { display:grid; grid-template-columns: minmax(0,1fr) minmax(0,300px); gap: var(--s-8); align-items:start; }
    .lab-verdict-main { min-width:0; }

    .lab-count { display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:600; color: var(--accent-strong);

    .lrange-cap { font-size:11.5px; font-weight:600; color: var(--accent-strong); margin-top:6px; }

    .lab-proof { }

    .lab-proof-quote em { color: var(--ink); font-style:italic; }
    .lab-proof-img { border:1px solid var(--line); border-radius: var(--r-md); overflow:hidden; max-height:360px; overflow-y:auto; background: var(--surface-2); }

    .lab-normals, .lab-other { border:1px solid var(--line); border-radius: var(--r-md); background: var(--surface); }

    .lab-normals-body, .lab-other-body { padding: 0 var(--s-4) var(--s-4); }

    .lab-normals-body ul, .lab-other-body ul { columns:2; gap: var(--s-5); font-size:12.5px; color: var(--ink); margin:0; padding-inline-start: var(--s-5); }
    .lab-normals-body li, .lab-other-body li { margin-bottom:3px; }

    @media (max-width: 920px) {

    .proof { background: var(--surface); border:1px solid var(--line); border-radius: var(--r-lg); overflow:hidden; box-shadow: var(--shadow-sm); }

    .proof-note { display:flex; gap:10px; align-items:flex-start; margin-top: var(--s-4); padding: var(--s-3) var(--s-4); background: var(--accent-soft); border-radius: var(--r-md); font-size:12.5px; line-height:1.55; color: var(--accent-strong); }
    .proof-note svg { width:16px; height:16px; flex-shrink:0; margin-top:1px; }
    .clin-link { display:inline-flex; align-items:center; gap:6px; margin-top: var(--s-4); font-size:13px; font-weight:600; color: var(--accent); background:none; border:none; cursor:pointer; padding:0; }
    .clin-link:disabled { opacity:.55; cursor:default; }

    .toggle { display:inline-flex; padding:3px; background: var(--surface-2); border-radius: var(--r-full); border:1px solid var(--line); }
    .toggle button { font-size:12.5px; font-weight:600; padding:6px 14px; border-radius: var(--r-full); border:none; background:transparent; color: var(--slate); cursor:pointer; transition: color var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out); }
    .toggle button.on { background: var(--surface); color: var(--accent); box-shadow: var(--shadow-sm); }
    .read-figcol { display:flex; flex-direction:column; gap: var(--s-3); }

    .viewtoggle button { font-size:12px; font-weight:600; padding:5px 16px; border:none; background:transparent; color: var(--slate); cursor:pointer; border-radius: var(--r-full); transition: color var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out); }
    .viewtoggle button.on { background: var(--surface); color: var(--accent); box-shadow: var(--shadow-sm); }

    /* Recent / Shared route screens */
    .route-title { font-size:30px; line-height:1.15; font-weight:700; letter-spacing:-0.8px; color: var(--ink); margin-bottom: var(--s-3); }

    .recent-row:hover { border-color: var(--accent-line); box-shadow: 0 0 0 3px var(--accent-glow); }
    .recent-ico { color: var(--accent); display:flex; flex-shrink:0; }
    .recent-thumb { width:40px; height:40px; flex-shrink:0; border-radius: var(--r-sm); overflow:hidden; background: var(--surface-2);
                    display:flex; align-items:center; justify-content:center; color: var(--accent); }

    .topbar-back { background:none; border:none; cursor:pointer; color: var(--slate); font-size:20px; line-height:1; padding:2px 6px;
                   border-radius: var(--r-sm); display:inline-flex; align-items:center; }
    .topbar-back:hover { color: var(--ink); background: var(--surface-2); }
    /* "What this means" sits with the evidence (under the proof), as a calm accent callout — not a
       separate full-width band (which forced the page to scroll). */
    .read-wtm { margin-top: var(--s-4); padding: var(--s-4) var(--s-5); background: var(--accent-soft); border:1px solid var(--accent-line); border-radius: var(--r-md); }
    .read-wtm h4 { font-size:13px; font-weight:600; color: var(--accent-strong); margin-bottom: var(--s-3); }
    .read-meaning { display:grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr)); gap: var(--s-6); margin-top: var(--s-6); align-content:start; }
    .sec-block { margin-top: var(--s-6); list-style:none; }

    .sec-block li { list-style:none; font-size:13.5px; line-height:1.55; color: var(--slate); padding-left: var(--s-5); position:relative; }
    .sec-block li::before { content:''; position:absolute; left:4px; top:8px; width:6px; height:6px; border-radius:50%; background: var(--accent); }

    /* clinician view */

    .clin-h { font-size:11px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color: var(--slate-300); margin-bottom: var(--s-3); }
    .clin-verline { display:flex; align-items:center; gap:10px; }

    .clin-vstatus.ok { color:#0f766e; background:#ccfbf1; }
    .clin-vstatus.warn { color:#9a3412; background:#ffedd5; }
    .clin-vstatus.muted { color: var(--slate); background: var(--surface-2); }
    .clin-score { font-size:13px; font-weight:600; color: var(--ink); }
    .clin-notes { font-size:12.5px; line-height:1.55; color: var(--slate); margin-top:8px; }
    .clin-row { display:flex; gap:10px; padding:10px 0; border-top:1px solid var(--line-soft); }
    .clin-row:first-of-type { border-top:none; }
    .clin-row-body { flex:1; }
    .clin-text { font-size:13px; line-height:1.5; color: var(--ink); }
    .clin-figlink { display:inline-flex; align-items:center; gap:5px; margin-top:5px; font-size:12px; font-weight:600; color: var(--accent); background:none; border:none; cursor:pointer; padding:0; }
    .clin-proof { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-md); overflow:hidden; }
    .clin-proof-head { display:flex; justify-content:space-between; align-items:center; gap:var(--s-3); padding:var(--s-3) var(--s-4); border-bottom:1px solid var(--line-soft); }
    .clin-proof-title { font-size:12.5px; font-weight:700; color:var(--ink); line-height:1.35; }

    .clin-proof-img img { width:100%; height:100%; object-fit:contain; display:block; }
    .clin-proof-empty { padding:var(--s-5); font-size:12.5px; line-height:1.5; color:var(--slate); background:var(--surface-2); }
    .compare-panel { margin-top:var(--s-4); padding:var(--s-4); border:1px solid var(--line); border-radius:var(--r-md); background:var(--surface); }
    .compare-head { display:flex; justify-content:space-between; gap:var(--s-4); align-items:flex-start; margin-bottom:var(--s-3); }
    .compare-title { font-size:13px; font-weight:800; color:var(--ink); margin-bottom:4px; }
    .compare-sub { font-size:12.5px; line-height:1.5; color:var(--slate); max-width:620px; }
    .compare-done { flex-shrink:0; font-size:11px; font-weight:800; color:var(--accent-strong); background:var(--accent-soft); padding:3px 8px; border-radius:var(--r-sm); box-shadow:inset 0 0 0 1px var(--accent-line); }
    .compare-controls { display:flex; align-items:center; gap:var(--s-3); flex-wrap:wrap; margin-bottom:var(--s-3); }
    .compare-file { max-width:360px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:12px; color:var(--slate); background:var(--surface-2); border:1px solid var(--line); border-radius:var(--r-sm); padding:5px 8px; }
    .compare-text { width:100%; min-height:96px; resize:vertical; border:1px solid var(--line); border-radius:var(--r-sm); padding:10px 12px; font:inherit; font-size:12.5px; line-height:1.45; color:var(--ink); background:var(--surface-2); }
    .compare-text:focus { outline:2px solid var(--accent); outline-offset:1px; background:var(--surface); }
    .compare-actions { display:flex; align-items:center; gap:var(--s-2); margin-top:var(--s-3); flex-wrap:wrap; }
    .compare-status { margin-top:var(--s-2); font-size:12.5px; line-height:1.5; color:var(--slate); }
    .compare-status.ok { color:var(--accent-strong); }
    .compare-status.err { color:#9f1239; }
    .ref-review { margin-top:var(--s-4); padding:var(--s-4); border:1px solid var(--line); border-left:3px solid var(--accent); border-radius:var(--r-md); background:var(--surface); }
    .ref-review.warn { border-left-color:#ea580c; background:#fff7ed; border-color:#fed7aa; }
    .ref-head { display:flex; align-items:center; justify-content:space-between; gap:var(--s-3); margin-bottom:8px; }
    .ref-kicker { font-size:12px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; color:var(--ink); }
    .ref-status { font-size:11px; font-weight:800; padding:3px 8px; border-radius:var(--r-sm); color:var(--accent-strong); background:var(--accent-soft); }
    .ref-status.warn { color:#9a3412; background:#ffedd5; }
    .ref-summary, .ref-copy, .ref-line { font-size:12.5px; line-height:1.55; color:var(--slate); }
    .ref-summary { margin-bottom:var(--s-3); }
    .ref-item { padding:10px 0; border-top:1px solid var(--line-soft); }
    .ref-item:first-of-type { border-top:none; }
    .ref-chip { display:inline-flex; align-items:center; width:max-content; max-width:100%; font-size:11px; font-weight:800; padding:3px 8px; border-radius:var(--r-sm); margin-bottom:6px; background:var(--surface-2); color:var(--slate); box-shadow:inset 0 0 0 1px var(--line); }
    .ref-chip.s-confirmed { color:var(--accent-strong); background:var(--accent-soft); box-shadow:inset 0 0 0 1px var(--accent-line); }
    .ref-chip.s-partially_supported { color:#854d0e; background:#fef3c7; box-shadow:inset 0 0 0 1px #fde68a; }
    .ref-chip.s-supported,
    .ref-chip.s-supported_by_focused_evidence { color:var(--accent-strong); background:var(--accent-soft); box-shadow:inset 0 0 0 1px var(--accent-line); }
    .ref-chip.s-unstable,
    .ref-chip.s-discordant,
    .ref-chip.s-cannot_assess { color:#854d0e; background:#fef3c7; box-shadow:inset 0 0 0 1px #fde68a; }
    .ref-chip.s-not_supported,
    .ref-chip.s-localization_wrong { color:#9a3412; background:#ffedd5; box-shadow:inset 0 0 0 1px #fed7aa; }

    .ref-tech-row { display:flex; gap:10px; padding:10px 0; border-top:1px solid var(--line-soft); }

    .tier-badge.tA { color:#fff; background: var(--accent); }
    .tier-badge.tB { color: var(--accent-strong); background: var(--accent-soft); box-shadow: inset 0 0 0 1px var(--accent-line); }
    .tier-badge.tC { color: var(--slate); background: var(--surface); box-shadow: inset 0 0 0 1px var(--line); }
    .tier-badge.tD { color: var(--slate-300); background: var(--surface-2); }

    .empty-banner { padding: var(--s-5); background: var(--surface); border:1px solid var(--accent-line); border-left:3px solid var(--accent); border-radius: var(--r-md); margin-bottom: var(--s-6); }
    .empty-banner .eb-t { font-size:15px; font-weight:600; color: var(--ink); margin-bottom:6px; }
    .empty-banner .eb-b { font-size:13.5px; line-height:1.6; color: var(--slate); }
    .empty-read-main { min-height:0; overflow:auto; scrollbar-gutter:stable; padding-right:var(--s-2); }
    .empty-result-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); padding:var(--s-6); box-shadow:var(--shadow-sm); }
    .empty-status { display:flex; align-items:center; gap:var(--s-3); margin-bottom:var(--s-4); }
    .empty-status-icon { width:38px; height:38px; border-radius:var(--r-md); display:flex; align-items:center; justify-content:center; color:var(--accent); background:var(--accent-soft); box-shadow:inset 0 0 0 1px var(--accent-line); flex-shrink:0; }
    .empty-status-title { font-size:22px; line-height:1.2; font-weight:700; color:var(--ink); letter-spacing:-.4px; }
    .empty-status-sub { font-size:13.5px; line-height:1.55; color:var(--slate); max-width:680px; }
    .empty-checklist { margin-top:var(--s-5); display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:var(--s-3); }
    .empty-checkitem { padding:var(--s-4); border:1px solid var(--line); border-radius:var(--r-md); background:var(--surface-2); }
    .empty-checkitem-t { font-size:12px; font-weight:700; color:var(--ink); margin-bottom:5px; }
    .empty-checkitem-b { font-size:12.5px; line-height:1.5; color:var(--slate); }
    .empty-actions { display:flex; gap:var(--s-3); align-items:center; margin-top:var(--s-5); flex-wrap:wrap; }
    .empty-side { min-height:0; overflow:auto; scrollbar-gutter:stable; padding-right:var(--s-2); display:flex; flex-direction:column; gap:var(--s-4); }
    .empty-side-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-md); padding:var(--s-4); }
    .empty-side-card .bodyfig { max-width:190px !important; }
    .empty-side-title { font-size:11px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--slate-300); margin-bottom:var(--s-3); }
    .empty-side-row { display:flex; justify-content:space-between; gap:var(--s-3); padding:8px 0; border-top:1px solid var(--line-soft); font-size:12.5px; }
    .empty-side-row:first-of-type { border-top:none; }
    .empty-side-row span:first-child { color:var(--slate); }

    /* Honest self-audit caution (CERT-2) — uses the existing warn token, distinct from the neutral empty-banner. */

    function screenFor(job) {

    function useReducedMotion() {
      const [reduced, setReduced] = useState(() =>
        window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
      useEffect(() => {
        if (!window.matchMedia) return;
        const mq = window.matchMedia('(prefers-reduced-motion: reduce)');
        const on = () => setReduced(mq.matches);
        mq.addEventListener ? mq.addEventListener('change', on) : mq.addListener(on);
        return () => { mq.removeEventListener ? mq.removeEventListener('change', on) : mq.removeListener(on); };
      }, []);
      return reduced;
    }

    function useToast() {
      const [toasts, setToasts] = useState([]);

        const id = ++toastId;
        setToasts(p => [...p, { id, message: L(message), type }]);  // static toasts localize; dynamic fall back to English
        setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4500);
      }, []);
      return { toasts, addToast };
    }

    function proofUrl(jobId, figureFilename) {
      if (!figureFilename) return null;
      if (figureFilename.startsWith('/') || figureFilename.startsWith('http')) return figureFilename; // demo / asset passthrough
      if (!jobId) return null;
      // basename only: the agent sometimes writes a 'report/foo.png' prefix, but images are served
      // by stem and the name guard rejects '/', so a prefixed name 404s. Strip any dir + extension.
      const stem = String(figureFilename).replace(/^.*[\\/]/, '').replace(/\.[^.]+$/, '');
      // Encode the stem — agent-authored figure names can contain spaces/parens/non-ASCII.
      return `${API_BASE}/api/images/${jobId}/${encodeURIComponent(stem)}`;
    }

    // Recent studies — a small client-side index so a completed Read can be reopened (and survives a
    // refresh, since the job_id is also kept in the URL). Backend stays the source of truth for the report.
    const RECENTS_KEY = 'mika.recents.v1';
    function loadRecents() { try { return JSON.parse(localStorage.getItem(RECENTS_KEY) || '[]'); } catch (_) { return []; } }
    function pushRecent(entry) {
      try {
        const list = loadRecents().filter(x => x && x.jobId && x.jobId !== entry.jobId);
        list.unshift(entry);
        localStorage.setItem(RECENTS_KEY, JSON.stringify(list.slice(0, 12)));
      } catch (_) {}
    }

    function stripTier(s) { return String(s || '').replace(/\s*\[Tier\s*[A-D][^\]]*\]\s*/gi, ' ').replace(/\s+/g,' ').trim(); }
    function tierFromText(s) { const m = String(s||'').match(/\[Tier\s*([A-D])/i); return m ? m[1].toUpperCase() : null; }
    function detailText(detail, fallback='Something went wrong.') {
      if (!detail) return fallback;
      if (typeof detail === 'string') return detail;
      return detail.error_message || detail.detail || detail.message || fallback;
    }

    // Parse a landmark token from a finding's text (spine day-one mechanism §5.6)
    function reEscape(s) { return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    function parseLandmark(anatomy, ...texts) {
      if (!REGION_PINS_APPROVED[anatomy] || !LANDMARKS[anatomy]) return null;  // M6 gate
      const t = texts.filter(Boolean).join(' ');
      if (anatomy === 'spine') {
        // Accept the full spinal column (C1–C7, T1–T12, L1–L5, S1) with flexible disc separators
        // (hyphen, en-dash, or slash) and an abbreviated/ bare-digit second token: L4-5, L4/5, L4/L5.
        // Levels with no calibrated landmark (cervical/thoracic) fall through to null → NO pin,
        // rather than mis-pinning to a partially-matched lumbar token (e.g. T11-T12 → T12). §5.7
        const LV = '(?:C[1-7]|T1[0-2]|T[1-9]|L[1-5]|S1)';
        const m = t.match(new RegExp(`\\b(${LV})(?:\\s*[-–/]\\s*(${LV}|[1-9]))?\\b`, 'i'));
        if (!m) return null;
        const a = m[1].toUpperCase();
        let b = m[2] ? m[2].toUpperCase() : null;
        if (b && /^[0-9]+$/.test(b)) {                 // bare digit → inherit the first token's letter (L4-5 → L4-L5)
          const prefix = (a.match(/^[A-Z]+/) || ['L'])[0];
          b = prefix + b;
        }
        const key = b ? `${a}-${b}` : a;
        return LANDMARKS.spine[key] ? key : (LANDMARKS.spine[a] ? a : null);
      }
      // Any other region: pin to the most specific named structure mentioned in the finding.
      // Longest key first so "medial meniscus" wins over "meniscus", "frontal lobe" over "lobe".
      // Word-boundary match (not substring) so 'pons' ≠ 'responses', 'base' ≠ 'baseline'. §5.7
      const keys = Object.keys(LANDMARKS[anatomy]).sort((a, b) => b.length - a.length);
      for (const k of keys) {
        if (new RegExp(`\\b${reEscape(k)}\\b`, 'i').test(t)) return k;
      }
      return null;
    }

    function hasRun2Trust(f) {
      return !!(f && f.trust && typeof f.trust === 'object');
    }
    function trustAllowsProof(f) {
      return !hasRun2Trust(f) || f.trust.proof_image !== false;
    }
    function trustAllowsMarker(f) {
      return !hasRun2Trust(f) || (f.trust.body_map_marker !== false && f.location_trusted !== false);
    }
    function trustedFigure(jobId, f) {
      return (f && f.figure && trustAllowsProof(f)) ? proofUrl(jobId, f.figure) : null;
    }

    function normalizeReferenceReview(report) {
      if (!report) return null;
      const agentSummary = (report.agent && report.agent.summary) || {};
      const rec = report.reconciliation || agentSummary.reconciliation || {};
      const patientRec = (report.patient && report.patient.reference_reconciliation) || rec.patient || {};
      const clinicianRec = (report.clinician && report.clinician.reference_reconciliation) || rec.clinician || {};
      const used = !!(rec.used || (patientRec.items && patientRec.items.length) || (clinicianRec.items && clinicianRec.items.length));
      if (!used) return null;
      const items = Array.isArray(rec.items) ? rec.items : [];
      const patientItems = Array.isArray(patientRec.items) ? patientRec.items : [];
      const clinicianItems = Array.isArray(clinicianRec.items) ? clinicianRec.items : [];
      return {
        used,
        hasDiscrepancy: !!(rec.summary && rec.summary.has_discrepancy),
        patientSummary: patientRec.summary || '',
        patientItems,
        clinicianSummary: clinicianRec.summary || '',
        clinicianItems: clinicianItems.length ? clinicianItems : items,
      };
    }

    function referenceStatusLabel(status) {
      return ({
        confirmed: 'Confirmed by blind read',
        supported_by_focused_evidence: 'Supported by focused evidence',
        partially_supported: 'Partly supported',
        not_independently_seen: 'Not independently seen',
        conflicts_with_reference: 'Disagrees with reference',
        cannot_assess: 'Cannot assess',
      })[status] || 'Needs review';
    }

    function cvCandidateStatusLabel(status) {
      return ({
        supported: 'Supported',
        not_supported: 'Not supported',
        cannot_assess: 'Cannot assess',
        localization_wrong: 'Localization wrong',
        unstable: 'Unstable',
        discordant: 'Discordant',
      })[status] || 'Needs review';
    }

    function normalizeCvSupportedReview(report) {
      if (!report) return null;
      const patientRows = Array.isArray((report.patient || {}).cv_supported_explanations)
        ? report.patient.cv_supported_explanations
        : [];
      const clinicianRows = Array.isArray((report.clinician || {}).cv_supported_findings)
        ? report.clinician.cv_supported_findings
        : (((report.assets || {}).cv_supported_findings) || []);
      if (!patientRows.length && !clinicianRows.length) return null;
      return { patientRows, clinicianRows };
    }

    function normalizeCvCandidateReview(report) {
      if (!report) return null;
      const candidates = Array.isArray(report.cv_candidates)
        ? report.cv_candidates
        : (((report.assets || {}).cv_candidates) || []);
      const reviews = Array.isArray(report.cv_candidate_reviews)
        ? report.cv_candidate_reviews
        : (((report.clinician || {}).cv_candidate_reviews) || []);
      const byId = {};
      candidates.forEach(c => { if (c && c.candidate_id) byId[c.candidate_id] = c; });
      const rows = reviews.map(r => ({ ...(byId[r.candidate_id] || {}), ...r }));
      if (!rows.length && !candidates.length) return null;
      return { candidates, rows };
    }

    function normalizeCvAdjudication(report) {
      if (!report) return null;
      const rows = Array.isArray(report.cv_candidate_adjudication)
        ? report.cv_candidate_adjudication
        : (((report.clinician || {}).cv_candidate_adjudication) || ((report.assets || {}).cv_candidate_adjudication) || []);
      if (!rows.length) return null;
      return { rows };
    }

    function patientReferenceStatusLabel(status) {
      return ({
        confirmed: 'MIKA also saw this',
        supported_by_focused_evidence: 'Supported by focused review',
        partially_supported: 'MIKA saw part of this',
        not_independently_seen: 'MIKA did not independently see this report finding',
        conflicts_with_reference: "MIKA's independent read differs from the uploaded report",
        cannot_assess: 'MIKA could not compare this item',
      })[status] || 'Needs review';
    }

    /* ═══════════════ buildViewModel (adapter = default, patient block = enhancement) §5 ═══════════════ */
    function buildViewModel(report) {
      if (!report) return null;
      const mode = report.mode || 'lite';
      const anatomy = figureAnatomy(report.detected_anatomy || 'unknown', report.anatomy_subregion || '');
      const patient = (report.agent && report.agent.summary && report.agent.summary.patient) || null;
      const referenceReview = normalizeReferenceReview(report);
      const cvSupportedReview = normalizeCvSupportedReview(report);
      const cvCandidateReview = normalizeCvCandidateReview(report);
      const cvAdjudication = normalizeCvAdjudication(report);
      const disclaimer = (patient && patient.disclaimer) || report.disclaimer || 'MIKA is an AI assistant and does not replace a doctor. All findings should be reviewed by a qualified clinician.';

      // Tier letters (A/B/C/D) must NEVER reach the patient view (locked non-negotiable #1). The agent
      // patient block is free-form model output, so strip defensively here exactly like the lite path. (CERT-1)
      const sArr = (arr) => (arr || []).map(s => stripTier(s)).filter(Boolean);
      if (mode === 'agent' && patient) {
        const conf = patient.confidence || {};
        const findings = (patient.findings || []).map((f, i) => {
          // Arabic block carries the English tier in `certainty_key` (logic/color/glyph stay English-keyed);
          // `certainty` is then the Arabic display word shown in the chip. English reports have no key.
          const key = f.certainty_key || f.certainty;
          const certainty = ['Confirmed','Likely','Possible'].includes(key) ? key : 'Possible';
          const certaintyLabel = f.certainty_key ? f.certainty : null;
          const loc = trustAllowsMarker(f) ? parseLandmark(anatomy, f.plain, f.caption) : null;
          return {
            id: `finding-${i}`,
            sourceIndex: i,
            plainSentence: stripTier(f.plain || ''),
            certainty, certaintyLabel,
            caption: stripTier(f.caption || ''),
            proofImageUrl: trustedFigure(report.job_id, f),
            location: loc ? { label: loc } : null,
            measurement: null,
          };
        }).sort((a,b) => CERTAINTY_RANK[a.certainty] - CERTAINTY_RANK[b.certainty]);
        const cot = patient.change_over_time;
        return {
          mode, anatomy,
          bottomLine: stripTier(patient.bottom_line || ''),
          overall: { label: conf.label || 'Moderate', note: stripTier(conf.note || ''), score: conf.score },
          study: patient.study || {},
          patient: patient.patient || {},
          findings, keyPoints: sArr(patient.key_points),
          whatItMeans: sArr(patient.what_it_means), worthFlagging: sArr(patient.worth_flagging),
          changeOverTime: (cot && (cot.points || cot.plain)) ? { points: sArr(cot.points), plain: stripTier(cot.plain || ''), figureUrl: proofUrl(report.job_id, cot.figure) } : null,
          clinicianFindings: (report.agent.summary.findings || []),
          verification: report.verification || {},
          pdfAvailable: !!report.pdf_available,
          clinicalPdfAvailable: !!report.clinical_pdf_available,
          referenceReview,
          cvSupportedReview,
          cvCandidateReview,
          cvAdjudication,
          disclaimer,
        };
      }

      // ── adapter (lite, or agent WITHOUT a patient block) ──
      const interp = report.interpretation || {};
      const agentSummary = (report.agent && report.agent.summary) || null;
      // An agent run that produced clinical findings but no patient block must NOT render a blank Read —
      // fall back to the agent's structured technical findings + impression. (DC-01 / DC-07)
      const agentTech = (agentSummary && Array.isArray(agentSummary.findings)) ? agentSummary.findings : [];
      const agentImp = (agentSummary && Array.isArray(agentSummary.impression)) ? agentSummary.impression
                     : (agentSummary && typeof agentSummary.impression === 'string' && agentSummary.impression.trim() ? [agentSummary.impression] : []);
      const liteImp = Array.isArray(interp.impression) ? interp.impression : (interp.impression ? [interp.impression] : []);
      const impression = liteImp.length ? liteImp : agentImp;
      const qs = (report.verification && report.verification.quality_score);
      const overallLabel = typeof qs === 'number' ? (qs >= 80 ? 'High' : qs >= 55 ? 'Moderate' : 'Low') : 'Moderate';

      // Prefer the agent's {text,tier,figure}; else the lite impression lines. Tier D = "cannot be
      // assessed" → NEVER a patient finding and never upgraded to Possible (CERT-5).
      const rawRows = agentTech.length
        ? agentTech.map(f => ({
            text: f.text || '',
            tier: (f.tier || tierFromText(f.text) || '').toUpperCase(),
            figure: f.figure,
            trust: f.trust,
            location_trusted: f.location_trusted,
          }))
        : impression.map(line => ({ text: line, tier: (tierFromText(line) || '').toUpperCase(), figure: null }));
      const findings = rawRows.map((r, i) => {
        const certainty = TIER_WORD[r.tier];           // D → null
        const plain = stripTier(r.text);
        // Body-DIAGRAM region pin: a categorical "which level" marker on a generic illustration,
        // positioned by a hand-authored landmark. It makes NO scan-pixel-precision claim (the finding
        // text already names the level), so it's driven by the level parsed from the text — NOT the
        // calibration/scan trust flags the agent reflexively sets false on uncalibrated studies.
        const loc = parseLandmark(anatomy, plain);
        return { id:`finding-${i}`, sourceIndex: i, plainSentence: plain, certainty, caption:'',
                 proofImageUrl: trustedFigure(report.job_id, r),
                 location: loc ? { label: loc } : null, measurement:null };
      }).filter(f => f.plainSentence && f.certainty)   // drop empty + Tier-D (certainty resolves to null)
        .sort((a,b)=>CERTAINTY_RANK[a.certainty]-CERTAINTY_RANK[b.certainty]);
      const clinicianFindings = agentTech.length ? agentTech
        : impression.map(line => ({ text: line, tier: tierFromText(line), figure: null }));
      return {
        mode, anatomy,
        bottomLine: stripTier(impression[0] || (rawRows[0] && rawRows[0].text) || ''),
        // Plain confidence note stays plain-language only — raw audit quality_notes belong to the
        // clinician view (vm.verification), never beside the patient's confidence pill. (CERT-4)
        overall: { label: overallLabel, note: '', score: qs },
        study: { body_part: report.detected_anatomy, modality: '', date: '', comparison: '' },
        patient: (report.demographics || {}),
        findings, keyPoints: [],
        whatItMeans: [], worthFlagging: [],
        changeOverTime: null,
        clinicianFindings,
        verification: report.verification || {},
        figures: report.figures || [],
        pdfAvailable: !!report.pdf_available,
        clinicalPdfAvailable: !!report.clinical_pdf_available,
        referenceReview,
        cvSupportedReview,
        cvCandidateReview,
        cvAdjudication,
        disclaimer,
      };
    }
