    const COV_ICON = { brain:I.brain, spine:I.spine, headneck:I.headneck, chest:I.chest, heart:I.heart, vessel:I.vessel, organ:I.organ, breast:I.breast, prostate:I.prostate, bone:I.bone, compare:I.compare };

    /* ═══════════════ Primitives ═══════════════ */
    function CertaintyGlyph({ certainty }) {
      // ● confirmed · ◐ likely · ○ possible
      if (certainty === 'Confirmed') return <svg className="glyph" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="currentColor"/></svg>;
      if (certainty === 'Likely') return <svg className="glyph" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="none" stroke="currentColor" strokeWidth="1.4"/><path d="M6 1 A5 5 0 0 1 6 11 Z" fill="currentColor"/></svg>;
      return <svg className="glyph" viewBox="0 0 12 12"><circle cx="6" cy="6" r="4.6" fill="none" stroke="currentColor" strokeWidth="1.4"/></svg>;
    }
    function CertaintyChip({ certainty, label }) {
      const cls = certainty === 'Confirmed' ? 'confirmed' : certainty === 'Likely' ? 'likely' : 'possible';
      // glyph + class stay keyed on the English tier; the visible word is the Arabic label when present,
      // else the localized English word (L() so a non-AR-block report still reads in the active language).
      return <span className={`cchip ${cls}`}><CertaintyGlyph certainty={certainty} />{label || L(certainty)}</span>;
    }
    function ConfidencePill({ label, score }) {
      const cls = label === 'High' ? 'high' : label === 'Low' ? 'low' : 'moderate';
      return <span className={`opill ${cls}`}><span className="dot" />{L('Read confidence:')} {L(label)}{typeof score === 'number' ? ` · ${Math.round(score)}%` : ''}</span>;
    }
    function ProgressBar({ value, reduced }) {
      const w = Math.max(0, Math.min(100, value || 0));
      return <div className="pbar"><div className="pbar-fill" style={{ width:`${w}%`, transition: reduced ? 'none' : undefined }} /></div>;
    }

    /* ═══════════════ Body-figure system (one instance, 3 states) ═══════════════ */
    function resolveDiagram(anatomy, state, view) {
      // Home is the coverage atlas → always the full body. Wait/Read zoom into the imaged area.
      if (state === 'home') return { base:'body', hasBodyMap:true };
      if (view === 'back' && ANATOMY_DIAGRAM_BACK[anatomy]) return { base: ANATOMY_DIAGRAM_BACK[anatomy], hasBodyMap:true };  // posterior view
      const base = ANATOMY_DIAGRAM[anatomy];
      if (!base) return { base:'body', hasBodyMap:true };          // cardiac / unknown → full-body fallback
      return { base, hasBodyMap:true };
    }
    function BodyFigure({ state, anatomy, findings, activeId, onMarkerClick, ariaLabel, inspect, view }) {
      const [src, setSrc] = useState(() => resolveDiagram(anatomy, state, view));
      useEffect(() => setSrc(resolveDiagram(anatomy, state, view)), [anatomy, state, view]);
      const onErr = useCallback(() => setSrc(s => (s.base === 'body' ? { base:null, hasBodyMap:false } : { base:'body', hasBodyMap:true })), []);
      const { base, hasBodyMap } = src;
      const knownRegion = !!ANATOMY_DIAGRAM[anatomy];
      const aspect = ASSET_ASPECT[base] || (880/1375);
      const fit = figureFit(state, base);
      // Pins are authored in the REGIONAL crop's coordinate space. If the regional asset failed to
      // load and we fell back to the full body, the coords no longer correspond — suppress pins
      // rather than drop them on the wrong body parts (§5.4 mispositioned-organ risk).
      const expectedReadBase = resolveDiagram(anatomy, 'read', view).base;
      return (
        <div
          className={`bodyfig state-${state}`}
          style={{
            '--bodyfig-max': `${fit.max || 520}px`,
            '--bodyfig-zoom': String(fit.zoom || 1),
            '--bodyfig-y': `${fit.y || 0}px`,
            '--bodyfig-origin-y': fit.originY || '50%',
          }}
        >
          <div className="bodyfig-stage" style={{ aspectRatio: String(aspect) }} role="img" aria-label={ariaLabel || 'Anatomical figure'}>
            {base ? (
              <picture>
                <source media="(max-width:600px)" srcSet={`/assets/anatomy/${base}@mobile.webp?v=${ASSET_VER}`} type="image/webp" />
                <source srcSet={`/assets/anatomy/${base}.webp?v=${ASSET_VER}`} type="image/webp" />
                <img className="bf-img" src={`/assets/anatomy/${base}.png?v=${ASSET_VER}`} alt="" onError={onErr} />
              </picture>
            ) : (
              <div className="bf-empty">A body map isn’t available for this scan — the findings and proof images below are the full read.</div>
            )}
            {state === 'home' && base && <div className="bf-glow" aria-hidden="true" />}
            {state === 'wait' && base && (inspect
              ? <div className="bf-focus" style={{ top:`${inspect.y*100}%` }} aria-hidden="true">
                  <span className="bf-focus-line" />
                  <span className="bf-focus-glow" style={{ left:`${inspect.x*100}%` }} />
                </div>
              : <div className={`bf-scan ${knownRegion ? '' : 'diffuse'}`} aria-hidden="true" />)}
            {state === 'read' && hasBodyMap && base === expectedReadBase && (() => {
              const VH = 100 / aspect;                       // viewBox height for 100-wide box
              const items = [];
              (findings || []).forEach((f, i) => {
                const xy = f.location && landmarkXY(anatomy, view, f.location.label);   // per-view coordinate
                if (xy) items.push({ id:f.id, n:i+1, certainty:f.certainty, x:xy.x, y:xy.y });
              });
              if (!items.length) return null;
              // tiny nudge so two findings at the exact same level each get a visible dot
              const seen = {};
              items.forEach(m => { const k = `${m.x.toFixed(3)},${m.y.toFixed(3)}`; const c = seen[k]||0; if (c) m.dotShift = (c%2 ? 1 : -1) * 0.03 * Math.ceil(c/2); seen[k] = c+1; });
              // Keep numbered chips local to the anatomical pin. A global side rail looks like the
              // marker is on the arm/hand on full-body assets, which is visually misleading.
              const sorted = [...items].sort((a,b) => a.y - b.y);
              sorted.forEach(m => {
                m.side = m.x > 0.58 ? -1 : 1;
                m.lxf = Math.max(0.08, Math.min(0.92, m.x + m.side * 0.12));
                m.lyf = m.y;
              });
              const gap = 0.050;
              [-1, 1].forEach(side => {
                const group = sorted.filter(m => m.side === side).sort((a,b) => a.y - b.y);
                let prev = -1;
                group.forEach(m => { m.lyf = Math.max(m.y, prev + gap); prev = m.lyf; });
                const overflow = prev - 0.98;
                if (overflow > 0) group.forEach(m => { m.lyf = Math.max(0.02, m.lyf - overflow); });
              });
              return (
                <svg className="bf-markers" viewBox={`0 0 100 ${VH.toFixed(1)}`} aria-hidden="true">
                  {sorted.map(m => {
                    const dx = (m.x + (m.dotShift||0)) * 100, dy = m.y * VH, lx = m.lxf * 100, ly = m.lyf * VH;
                    const endX = lx - (m.side * 4.6);
                    return (
                      <g key={m.id} className={`mk ${m.certainty.toLowerCase()} ${activeId===m.id ? 'active':''}`} onClick={()=>onMarkerClick && onMarkerClick(m.id)}>
                        <path className="mk-leader" d={`M ${dx.toFixed(1)} ${dy.toFixed(1)} C ${((dx+endX)/2).toFixed(1)} ${dy.toFixed(1)}, ${((dx+endX)/2).toFixed(1)} ${ly.toFixed(1)}, ${endX.toFixed(1)} ${ly.toFixed(1)}`} />
                        <circle className="mk-halo" cx={dx} cy={dy} r="3.6" />
                        <circle className="mk-dot" cx={dx} cy={dy} r="1.7" />
                        <circle className="mk-chip" cx={lx} cy={ly} r="4.1" />
                        <text className="mk-num" x={lx} y={ly} textAnchor="middle" dominantBaseline="central" fontSize="4.6" fontWeight="700">{m.n}</text>
                      </g>
                    );
                  })}
                </svg>
              );
            })()}
          </div>
        </div>
      );
    }

    function RecentScreen({ onOpen, onNew }) {
      // Durable, server-backed list: every study read on this machine is indexed on disk by the backend

      const [items, setItems] = useState(() => loadRecents());

        api.reports().then(d => {

            jobId: r.job_id,

    // Leader lines fanning from the body figure to the coverage list (ResizeObserver-recomputed; hidden <1180px).
    function HomeLeaders({ gridRef }) {
      const [state, setState] = useState({ w:0, h:0, paths:[] });
      const lastRef = useRef('');
      useEffect(() => {
        const grid = gridRef.current; if (!grid) return;
        let raf = 0;
        const compute = () => {
          if (window.innerWidth < 1180) { if (lastRef.current !== 'none') { lastRef.current='none'; setState({ w:0,h:0,paths:[] }); } return; }
          const gr = grid.getBoundingClientRect();
          const stage = grid.querySelector('.bodyfig-stage'); if (!stage || stage.getBoundingClientRect().width < 20) return;
          const sb = stage.getBoundingClientRect();
          const next = [];
          grid.querySelectorAll('.cov-row.leader').forEach(row => {
            const pt = BODY_POINTS[row.getAttribute('data-region')]; if (!pt) return;
            const rr = row.getBoundingClientRect();
            const x1 = sb.left - gr.left + pt.x * sb.width, y1 = sb.top - gr.top + pt.y * sb.height;
            const x2 = rr.left - gr.left - 6, y2 = rr.top - gr.top + rr.height/2;
            const mx = x1 + (x2 - x1) * 0.55;
            next.push({ d:`M ${x1.toFixed(1)} ${y1.toFixed(1)} C ${mx.toFixed(1)} ${y1.toFixed(1)}, ${mx.toFixed(1)} ${y2.toFixed(1)}, ${x2.toFixed(1)} ${y2.toFixed(1)}`, x1:+x1.toFixed(1), y1:+y1.toFixed(1) });
          });
          const sig = `${gr.width.toFixed(0)}x${gr.height.toFixed(0)}|` + next.map(p=>p.d).join('|');
          if (sig === lastRef.current) return;            // no-op when unchanged → avoids RO churn
          lastRef.current = sig;
          setState({ w: gr.width, h: gr.height, paths: next });
        };
        const schedule = () => { cancelAnimationFrame(raf); raf = requestAnimationFrame(compute); };
        schedule();
        const ro = new ResizeObserver(schedule); ro.observe(grid);
        window.addEventListener('resize', schedule);
        const img = grid.querySelector('.bf-img'); if (img && !img.complete) img.addEventListener('load', schedule);
        const t = setTimeout(schedule, 300); // after fonts/layout settle
        return () => { ro.disconnect(); window.removeEventListener('resize', schedule); clearTimeout(t); cancelAnimationFrame(raf); };
      }, [gridRef]);
      const { w, h, paths } = state;
      if (!paths.length) return null;
      return (
        <svg className="home-leaders" width={w} height={h} viewBox={`0 0 ${w} ${h}`} aria-hidden="true">
          {paths.map((p,i) => <g key={i}><path d={p.d} className="leader-path" /><circle cx={p.x1} cy={p.y1} r="2.2" className="leader-cap" /></g>)}
        </svg>
      );
    }

    /* ═══════════════ WAIT ═══════════════ */
    // Cinematic slice viewer — the actual study images being read (scanner-style frame, scan-line,
    // corner brackets, mono HUD). Shows IMAGES only, never findings. Graceful: renders nothing if no slices.
    function ReadingViewer({ slices, label, plane, totalSlices }) {
      const reduced = useReducedMotion();
      const [idx, setIdx] = useState(0);
      useEffect(() => {
        if (reduced || !slices || slices.length < 2) return;
        const t = setInterval(() => setIdx(i => (i + 1) % slices.length), 5200);
        return () => clearInterval(t);
      }, [slices, reduced]);
      if (!slices || !slices.length) return null;
      const meta = [label, L(plane), totalSlices ? `${totalSlices} ${L('images')}` : null].filter(Boolean).join('  ·  ').toUpperCase();
      return (
        <div className="reading-viewer" role="img" aria-label={`The ${label || 'scan'} being read, image by image.`}>
          <div className="rv-stage">
            {slices.map((s, i) => <img key={s + i} className={`rv-slice ${i === idx ? 'on' : ''}`} src={s} alt="" loading="lazy" />)}
            <span className="rv-grid" aria-hidden="true" />
            <span className="rv-scan" aria-hidden="true" />
            <i className="rv-bk tl" aria-hidden="true" /><i className="rv-bk tr" aria-hidden="true" />
            <i className="rv-bk bl" aria-hidden="true" /><i className="rv-bk br" aria-hidden="true" />
            <div className="rv-hud"><span className="rv-tag">{L('READING')}</span><span className="rv-meta">{meta}</span></div>
          </div>
        </div>
      );
    }

    function WaitScreen({ progress, sequences, anatomy, jobId }) {
      const [selectedSeq, setSelectedSeq] = useState(null);  // a sequence the user clicked to view
      const phases = phaseStates(progress.progress || 0, progress.status);
      const pct = Math.round(progress.progress || 0);
      // eta_seconds clamps to 0 in the over-estimate tail; treat <=0 as "no honest number left" → the
      // "Almost done…" copy, instead of perpetually claiming "about 1 min". (sm-08)
      const eta = (progress.eta_seconds != null && progress.eta_seconds > 0) ? Math.max(1, Math.ceil(progress.eta_seconds/60)) : null;
      const seqs = (sequences && sequences.sequences) || [];
      const knownRegion = !!ANATOMY_DIAGRAM[anatomy];
      // Truthful study facts from the §7.3 inventory pre-step — no fabricated per-slice position.
      const REGION_LABEL = { spine:'Spine', brain:'Brain', msk:'Musculoskeletal', cardiac:'Cardiac', chest:'Chest', abdomen:'Abdomen', breast:'Breast', vascular:'Vascular', head_neck:'Head & neck', prostate:'Prostate' };
      const totalImages = seqs.reduce((n,s)=> n + (Number(s.num_slices)||0), 0);
      const MOD = { MR:'MRI', CT:'CT', CR:'X-ray', DX:'X-ray', US:'Ultrasound', MG:'Mammography', XA:'Angiography', PT:'PET', NM:'Nuclear medicine' };
      const facts = [
        { label:'Region', value: REGION_LABEL[anatomy] || (anatomy && anatomy !== 'unknown' ? anatomy[0].toUpperCase()+anatomy.slice(1) : null) },
        { label:'Modality', value: MOD[(sequences && sequences.modality)] || (sequences && sequences.modality) || 'MRI' },
        { label:'Sequences', value: seqs.length ? String(seqs.length) : null },
        { label:'Images', value: totalImages ? String(totalImages) : null },
      ].filter(f => f.value);
      const PHASE_ICON = { stack:I.stack, target:I.target, scan:I.scan, shield:I.shield };
      const activeIdx = phases.findIndex(p => p.state==='active');
      const fillIdx = activeIdx >= 0 ? activeIdx : (phases.every(p => p.state==='done') ? phases.length-1 : 0);
      const fillPct = (fillIdx / (phases.length - 1)) * 100;
      const activeName = progress.active_sequence || null;  // real "now reading X" when emitted
      const activeRegion = (progress.active_region || '').trim() || null;  // real "now inspecting <region>"
      const rawStatus = (progress.message || '').trim();
      const ar = UI_LANG === 'ar';   // sequence names (STIR/T2) stay Latin; region words localize
      const liveLabel = activeName && activeRegion
        ? (ar ? `${activeName}: فحص ${L(activeRegion)}` : `${activeName}: checking ${activeRegion}`)
        : activeName
          ? (ar ? `قراءة ${activeName}` : `Reading ${activeName}`)
          : activeRegion
            ? (ar ? `فحص ${L(activeRegion)}` : `Checking ${activeRegion}`)
            : rawStatus || L('Organizing images and measurements');
      const view = DEFAULT_VIEW(anatomy);   // spine → posterior (matches wait.png), others → their close-up
      // map the inspected region to a position on the figure (per-view, via clinician-reviewed landmarks)
      const inspect = activeRegion ? landmarkXY(anatomy, view, activeRegion) : null;
      // a user-clicked sequence wins; else the one the agent is reading now; else the first.
      const activeSeq = (selectedSeq && seqs.find(s => s.name === selectedSeq))
        || (activeName ? seqs.find(s => s.name === activeName) : (seqs[0] || null));
      // show the sequence being analyzed, flipping through ITS slices
      const seqImgs = (s) => !s ? []
        : (s.slices && s.slices.length) ? s.slices
        : (s.slice_stems && s.slice_stems.length) ? s.slice_stems.map(st => proofUrl(jobId, st)).filter(Boolean)
        : (s.thumb ? [s.thumb] : []);
      let sliceImgs = seqImgs(activeSeq);
      // fallback: if the active sequence has no images, show slices from ANY sequence that does —
      // the user just wants to see a real slice during the read, not necessarily the exact one.
      if (!sliceImgs.length) { for (const s of seqs) { const im = seqImgs(s); if (im.length) { sliceImgs = im; break; } } }
      // Latest annotated view for the bottom-right (claim-free): the level map once mapped, else a
      // representative slice currently being read. Fills the rail and shows real, honest progress.
      const latestImage = (sequences && sequences.level_map) || (sliceImgs.length ? sliceImgs[Math.floor(sliceImgs.length/2)] : null);
      return (
        <div className="page-inner page-wait fade-up">
          <div className="wait-grid">
            <div className="wait-left">
              <h1 className="wait-heading">{L(COPY.wait.heading)}</h1>
              {facts.length > 0 && (
                <div className="wait-facts" aria-label="Study summary">
                  {facts.map(f => (
                    <div className="wait-fact" key={f.label}>
                      <span className="wait-fact-label">{L(f.label)}</span>
                      <span className="wait-fact-value">{L(f.value)}</span>
                    </div>
                  ))}
                </div>
              )}
              <div className="stepper" role="list" aria-label="Reading progress">
                <div className="stepper-track" aria-hidden="true"><div className="stepper-fill" style={{ width:`${fillPct}%` }} /></div>
                {phases.map(p => (
                  <div className={`step ${p.state}`} key={p.key} role="listitem" aria-current={p.state==='active' ? 'step' : undefined}>
                    <div className="step-node">{p.state==='done' ? I.check({ width:18, height:18 }) : (PHASE_ICON[p.icon] || I.scan)({ width:19, height:19 })}</div>
                    <div className="step-label">{L(p.short)}</div>
                  </div>
                ))}
              </div>
              <div className="wait-live" role="status" aria-live="polite">{liveLabel}</div>
              <ReadingViewer slices={sliceImgs} label={activeSeq && activeSeq.name} plane={activeSeq && activeSeq.plane} totalSlices={activeSeq && activeSeq.num_slices} />
              <div className="safe-leave">{I.bell({})}{L(COPY.wait.safe)}</div>
            </div>

            <div className="wait-body">
              <BodyFigure state="wait" anatomy={anatomy} view={view} inspect={inspect} ariaLabel={activeRegion ? `Checking ${activeRegion}` : 'MIKA is reading the study.'} />
            </div>

            <div className="wait-right">
              <div className="seq-panel">
                <div className="seq-title">{L(COPY.wait.seqTitle)}</div>
                {seqs.length ? (() => {
                  const activeI = activeName ? seqs.findIndex(x => x.name === activeName) : -1;
                  return seqs.map((s,i) => {
                    const isActive = activeI === i;
                    const isDone = activeI >= 0 && i < activeI;     // only truthful once the agent reports position
                    const thumb = s.thumb || (s.thumb_stem ? proofUrl(jobId, s.thumb_stem) : null)
                      || ((s.slice_stems && s.slice_stems.length) ? proofUrl(jobId, s.slice_stems[0]) : null);
                    const isSelected = selectedSeq === s.name;
                    return (
                      <div className={`seq-row ${(isSelected || isActive)?'active':''}`} key={i}
                           onClick={() => setSelectedSeq(s.name)} role="button" tabIndex={0}
                           style={{ cursor:'pointer' }}
                           onKeyDown={(e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); setSelectedSeq(s.name); } }}>
                        <div className={`seq-thumb ${isActive?'scanning':''}`}>
                          {thumb ? <img src={thumb} alt="" loading="lazy" /> : I.scan({})}
                          {isActive && <span className="seq-scanline" aria-hidden="true" />}
                        </div>
                        <div><div className="seq-name">{s.name}</div><div className="seq-meta">{[L(s.plane), s.num_slices ? `${s.num_slices} ${L('slices')}` : null].filter(Boolean).join(' · ')}</div></div>
                        {isDone ? <span className="seq-check">{I.check({})}</span> : isActive ? <span className="seq-active-dot" /> : null}
                      </div>
                    );
                  });
                })() : <div className="seq-placeholder">{L(COPY.wait.seqPlaceholder)}</div>}
              </div>
              {latestImage && (
                <div className="wait-latest">
                  <div className="wait-latest-t">{sequences && sequences.level_map ? L('Level map') : L('Latest view')}</div>
                  <div className="wait-latest-img">
                    <img src={latestImage} alt="" loading="lazy" />
                    <span className="wait-latest-scan" aria-hidden="true" />
                  </div>
                </div>
              )}
              <div className="progress-block" role="status" aria-live="polite">
                <div className="progress-head"><span className="ph-l">{L(COPY.wait.overall)}</span><span className="ph-r">~{pct}%</span></div>
                <ProgressBar value={pct} />
                <div className="progress-eta">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
                  {eta ? <span>{UI_LANG==='ar'?'الوقت المتبقي: ':'Time left: '}<strong>{UI_LANG==='ar'?`${eta} دقيقة تقريباً`:`about ${eta} min`}</strong></span> : <span>{L('Finishing the final checks')}</span>}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ═══════════════ READ ═══════════════ */
    function ProofPanel({ finding, onZoom }) {
      if (!finding) return null;
      return (
        <div className="proof">
          <div className="proof-head"><div className="proof-title">{finding.plainSentence}</div><CertaintyChip certainty={finding.certainty} label={finding.certaintyLabel} /></div>
          <div className="proof-img-wrap" onClick={() => finding.proofImageUrl && onZoom(finding.proofImageUrl)}>
            {finding.proofImageUrl
              ? <img src={finding.proofImageUrl} alt={`Annotated proof: ${finding.plainSentence}`} loading="lazy" onError={e=>{e.target.style.display='none'; e.target.parentNode.querySelector('.proof-img-missing').style.display='block';}} />
              : null}
            <div className="proof-img-missing" style={{ display: finding.proofImageUrl ? 'none':'block' }}>{L('Proof image unavailable for this finding.')}</div>
          </div>
          {finding.caption && <div className="proof-cap">{finding.caption}</div>}

    const WORD2LETTER = { Confirmed:'A', Likely:'B', Possible:'C' };

    function CompareReportPanel({ jobId, review, state, setState, onCompare, onCancel }) {
      const fileRef = useRef(null);
      if (!jobId || jobId === 'demo') return null;
      const status = (state && state.status) || 'idle';
      const busy = status === 'running';
      const file = state && state.file;
      const text = (state && state.text) || '';
      const hasInput = !!file || !!text.trim();
      const compared = !!(review && review.used);
      const chooseLabel = file ? L('Change report file') : L('Upload report PDF');
      const compareLabel = status === 'error' ? L('Retry comparison') : L('Compare with my report');
      const clear = () => {
        if (busy) return;
        if (fileRef.current) fileRef.current.value = '';
        setState({ status:'idle', file:null, text:'', error:null });
      };
      return (
        <div className="compare-panel">
          <div className="compare-head">
            <div>
              <div className="compare-title">{L('Compare with my report')}</div>
              <div className="compare-sub">{L('Upload your radiology report or paste its text. MIKA will compare it with the independent image read without changing the read.')}</div>
            </div>
            {compared && <span className="compare-done">{L('Reference-assisted review added')}</span>}
          </div>
          <div className="compare-controls">
            <input ref={fileRef} type="file" accept=".pdf,.txt,.md,.rtf,application/pdf,text/plain" style={{display:'none'}}
              onChange={e=>setState(s=>({ ...(s||{}), file:(e.target.files && e.target.files[0]) || null, status:'idle', error:null }))} />
            <button className="btn btn-ghost btn-sm" type="button" disabled={busy} onClick={()=>fileRef.current && fileRef.current.click()}>
              {I.upload({width:14,height:14})} {chooseLabel}
            </button>
            {file && <span className="compare-file" title={file.name}>{file.name}</span>}
          </div>
          <textarea className="compare-text" value={text} disabled={busy}
            placeholder={L('Or paste the report text here.')}
            onChange={e=>setState(s=>({ ...(s||{}), text:e.target.value, status:'idle', error:null }))} />
          <div className="compare-actions">
            <button className="btn btn-primary btn-sm" type="button" disabled={busy || !hasInput}
              onClick={()=>onCompare({ file, text })}>{busy ? L('Comparing...') : compareLabel}</button>
            {busy && <button className="btn btn-ghost btn-sm" type="button" onClick={onCancel}>Cancel</button>}
            {!busy && hasInput && <button className="btn btn-ghost btn-sm" type="button" onClick={clear}>Clear</button>}
          </div>
          {busy && <div className="compare-status">{L("Extracting the report and comparing it with MIKA's independent read...")}</div>}
          {status === 'success' && <div className="compare-status ok">{L('Comparison complete. The reference-assisted review is shown below.')}</div>}
          {status === 'cancelled' && <div className="compare-status">{L('Comparison cancelled. Your blind read was not changed.')}</div>}
          {status === 'error' && <div className="compare-status err">{state.error || 'MIKA could not compare that report.'}</div>}
        </div>
      );
    }

    // dir-isolated number/unit span so digits + units never reverse in RTL
    function Num({ children }) { return <span className="num" dir="ltr">{children}</span>; }

    // Pure parse of a printed two-sided numeric range ("30-100", "30 – 100"); null if not two numbers.
    function parseTwoSided(text) {
      if (!text) return null;
      const m = String(text).match(/(-?\d+(?:\.\d+)?)\s*[-–—to]+\s*(-?\d+(?:\.\d+)?)/i);
      if (!m) return null;
      const lo = parseFloat(m[1]), hi = parseFloat(m[2]);
      if (!isFinite(lo) || !isFinite(hi) || hi <= lo) return null;
      return { lo, hi };
    }

    // Range bar — renders ONLY for two_sided_numeric with a parseable range + numeric value. Clamps
    // out-of-range to a labelled end-cap; never fabricates a tick beyond the rail. (concept §4 / plan)
    function LabRangeBar({ r }) {
      if (r.range_type !== 'two_sided_numeric') return null;
      const bounds = parseTwoSided(r.ref_range_text);
      const val = parseFloat(String(r.value).replace(/[^0-9.\-]/g, ''));
      if (!bounds || !isFinite(val)) return null;
      const { lo, hi } = bounds;
      const span = hi - lo;
      const pad = span;                         // show one band-width of head-room each side
      const min = lo - pad, max = hi + pad;
      const pct = (x) => Math.max(0, Math.min(100, ((x - min) / (max - min)) * 100));
      const bandL = pct(lo), bandR = pct(hi);
      const tick = pct(val);
      const farBelow = val < lo - 1.5 * span, farAbove = val > hi + 1.5 * span;
      return (
        <div className="lrange">
          <div className="lrange-rail">
            <div className="lrange-band" style={{ insetInlineStart:`${bandL}%`, inlineSize:`${bandR - bandL}%` }} />
            <div className="lrange-tick" style={{ insetInlineStart:`${tick}%` }} aria-hidden="true" />
          </div>
          <div className="lrange-scale">
            <span className="num" dir="ltr">{lo}</span>
            <span className="num" dir="ltr">{hi}</span>
          </div>
          {(farBelow || farAbove) && <div className="lrange-cap">{L(farAbove ? COPY.lab.wellAbove : COPY.lab.wellBelow)}</div>}
        </div>
      );
    }

    function LabReadScreen({ report, jobId }) {

      const [otherOpen, setOtherOpen] = useState(false);
      const disclaimer = 'This is an AI-generated analysis, not a medical diagnosis — please discuss it with your doctor.';

      // Error / unreadable read — calm register, no fake results.

      if (!report || unreadable) {
        return (
          <div className="page-inner page-lab-read fade-up">

      // Split: flagged cards = non-normal/unknown, high-confidence, clear enough (most-off NOT inferred —

      const flagged = results.filter(r => !['normal','unknown'].includes(r.status) && ['Confirmed','Likely'].includes(r.confidence) && (r.clarity ?? 0) >= 0.7);
      const rest = results.filter(r => !flagged.includes(r));

      const normalsN = (typeof overall.normal_count === 'number') ? overall.normal_count : rest.filter(r => r.status === 'normal').length;

    /* ═══════════════ App (state + screenFor switch) ═══════════════ */
    const EMPTY_JOB = { id:null, status:'pending', mode:null, progress:0, message:'', eta_seconds:null, est_total_seconds:null, error:null, active_sequence:null, active_region:null };
    const EMPTY_COMPARE = { status:'idle', file:null, text:'', error:null };
    function initialJobFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const jobId = params.get('job_id') || DEEP_LINK_JOB;
      if (params.get('demo') || !jobId) return EMPTY_JOB;
      return { ...EMPTY_JOB, id:jobId, status:'loading', progress:0, message:'Opening saved read...' };
    }

    // Tiny markdown renderer for chat answers (no library): **bold**, blank-line paragraphs, "- " bullets,
    // and a leading "**Label:**" → a quiet accent mini-label. Kills literal asterisks; degrades to plain text.
    function renderMarkdown(text) {
      const inline = (str) => str.split(/(\*\*[^*]+\*\*)/g).map((seg, i) =>
        /^\*\*[^*]+\*\*$/.test(seg) ? <strong key={i}>{seg.slice(2, -2)}</strong> : seg);
      const out = []; let li = [];
      const flush = () => { if (li.length) { out.push(<ul className="chat-md-ul" key={'u'+out.length}>{li}</ul>); li = []; } };
      String(text || '').split('\n').forEach((raw, i) => {
        const s = raw.trim();
        if (!s) { flush(); return; }
        if (/^[-*]\s+/.test(s)) { li.push(<li key={i}>{inline(s.replace(/^[-*]\s+/, ''))}</li>); return; }
        flush();
        const m = s.match(/^\*\*([^*]+:)\*\*\s*(.*)$/);
        out.push(m
          ? <p className="chat-md-p" key={i}><span className="chat-md-lead">{m[1]}</span> {inline(m[2])}</p>
          : <p className="chat-md-p" key={i}>{inline(s)}</p>);
      });
      flush();
      return out;
    }
    // Case chat — "Beside" v2: MIKA itself speaking. The assistant presence is the real helix mark (a dusk coin,
    // cropped from the logo raster), answers are markdown-typeset notes, the thinking state is the coin breathing.
    const CHAT_MARK = <img src="/assets/brand/mika-mark.png" alt="" aria-hidden="true" />;
    const CHAT_CHIPS = ['What does my result mean in simple terms?', 'Is it serious?', 'What should I do now?'];
    function ChatDrawer({ jobId, studyLabel, onClose }) {
      const [msgs, setMsgs] = useState([]);     // [{role:'user'|'assistant', text}]
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState(false);
      const [q, setQ] = useState('');
      const threadRef = useRef(null);
      useEffect(() => { const t = threadRef.current; if (t) t.scrollTop = t.scrollHeight; }, [msgs, busy]);
      const send = async (text) => {
        text = (text || '').trim(); if (!text || busy) return;
        setErr(false); setQ('');
        const history = msgs.slice(-24).map(m => ({ role:m.role, text:m.text }));
        setMsgs(m => [...m, { role:'user', text }]); setBusy(true);
        try { const d = await api.chat(jobId, text, history); setMsgs(m => [...m, { role:'assistant', text:(d && d.answer) || '' }]); }
        catch(_) { setErr(true); }
        finally { setBusy(false); }
      };
      return (
        <div className="chat-drawer" role="dialog" aria-label={L('Ask about your read')}>
          <div className="chat-head">
            <span className="chat-mark">{CHAT_MARK}</span>
            <div className="chat-head-t">
              <div className="chat-head-title">{L('Ask about your read')}</div>
              {studyLabel && <div className="chat-head-sub">{studyLabel}</div>}
            </div>
            <span className="chat-scope">{L('this study only')}</span>
            <button className="chat-x" onClick={onClose} aria-label="Close">×</button>
          </div>
          <div className="chat-thread" ref={threadRef}>
            {msgs.length === 0 && !busy && (
              <div className="chat-empty">
                <span className="chat-mark chat-mark-lg">{CHAT_MARK}</span>
                <div className="chat-empty-line">{L("Ask me anything about this scan — I'll keep it plain.")}</div>
              </div>
            )}
            {msgs.map((m, i) => m.role === 'user'
              ? <div className="chat-q" key={i}><div className="bub">{m.text}</div></div>
              : <div className="chat-a" key={i}>
                  <span className="chat-mark chat-a-mark">{CHAT_MARK}</span>
                  <div className="chat-note">{renderMarkdown(m.text)}</div>
                </div>)}
            {busy && <div className="chat-think"><span className="chat-mark chat-mark-pulse">{CHAT_MARK}</span>{L('MIKA is reading your report…')}</div>}
            {err && <div className="chat-err">{L("Couldn't answer just now — try again")}</div>}
          </div>
          <div className="chat-foot">
            {msgs.length === 0 && <div className="chat-chips">{CHAT_CHIPS.map((c, i) => <span className="chat-chip" key={i} onClick={()=>send(c)}>{L(c)}</span>)}</div>}
            <div className="chat-inputrow">
              <input value={q} onChange={e=>setQ(e.target.value)} placeholder={L('Ask in your own words…')} aria-label={L('Ask about your read')}
                     onKeyDown={e=>{ if (e.key==='Enter') { e.preventDefault(); send(q); } }} />
              <button className="chat-send" onClick={()=>send(q)} disabled={busy || !q.trim()} aria-label="Send">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
              </button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const reduced = useReducedMotion();
      const { toasts, addToast } = useToast();
      const [connection, setConnection] = useState(null);
      const [job, setJob] = useState(initialJobFromUrl);
      const [ready, setReady] = useState(null);            // upload response (file_count, input_format)
      const [history, setHistory] = useState('');
      const [report, setReport] = useState(null);
      const [sequences, setSequences] = useState({ sequences:[] });
      const [uiPrefs, setUiPrefs] = useState({
        view: QS.get('view')==='clinician' ? 'clinician' : 'plain',
        lang: (QS.get('lang')==='ar' || (()=>{ try { return localStorage.getItem(UI_LANG_KEY)==='ar'; } catch(_) { return false; } })()) ? 'ar' : 'en',
      });
      // Drive UI_LANG (read during render by L()) + <html dir/lang> from the active language.
      UI_LANG = uiPrefs.lang || 'en';
      useEffect(() => {
        const ar = uiPrefs.lang === 'ar';
        document.documentElement.dir = ar ? 'rtl' : 'ltr';
        document.documentElement.lang = ar ? 'ar' : 'en';
        try { localStorage.setItem(UI_LANG_KEY, ar ? 'ar' : 'en'); } catch(_) {}
      }, [uiPrefs.lang]);
      const [route, setRoute] = useState(null);   // null = job-derived screen (home/wait/read); 'recent' = nav overlay
      const [activeId, setActiveId] = useState(null);
      const [lightbox, setLightbox] = useState(null);
      const [showAbout, setShowAbout] = useState(false);
      const [showConnect, setShowConnect] = useState(false);
      const [chatOpen, setChatOpen] = useState(false);
      const [chatAvail, setChatAvail] = useState(false);   // gate the trigger on the backend flag (MIKA_CHAT_ENABLED)
      useEffect(() => { api.chatAvailability().then(d => setChatAvail(!!(d && d.enabled))).catch(()=>{}); }, []);
      const [checkingConn, setCheckingConn] = useState(false);
      const [authSession, setAuthSession] = useState(null);
      const [compareState, setCompareState] = useState(EMPTY_COMPARE);
      const esRef = useRef(null), pollRef = useRef(null), authPollRef = useRef(null);
      const compareAbortRef = useRef(null);
      const popping = useRef(false);   // true while applying a browser Back/Forward (suppresses re-push)
      const didMountUrl = useRef(false);   // skip the first URL-sync so a deep-link ?job_id isn't stripped on mount
      const [dm, setDm] = useState(DEMO);   // live demo override (dev visual gate; switchable without reload)
      useEffect(() => { window.__demo = (s) => setDm(s || null); return () => { try { delete window.__demo; } catch(_){} }; }, []);

      const screen = dm ? (dm.startsWith('read') ? 'read' : dm) : screenFor(job);
      const vm = useMemo(() => buildViewModel(report), [report]);
      const stopAuthPoll = useCallback(() => {
        if (authPollRef.current) { clearTimeout(authPollRef.current); authPollRef.current = null; }
      }, []);
      useEffect(() => {
        if (compareAbortRef.current) { compareAbortRef.current.abort(); compareAbortRef.current = null; }
        setCompareState(EMPTY_COMPARE);
      }, [job.id]);

      // connection check (Connect-with-Claude flow — uses the existing /api/agent/availability + /api/connect)
      const checkConnection = useCallback(async () => {
        setCheckingConn(true);
        try { const a = await api.preflight(); setConnection(a); if (a.connected) setAuthSession(null); }
        catch (_) { setConnection({ connected:false }); }
        finally { setCheckingConn(false); }
      }, []);
      useEffect(() => { api.preflight().then(setConnection).catch(() => setConnection({ connected:false })); return stopAuthPoll; }, [stopAuthPoll]);
      // "Connect with Claude": launch the browser sign-in (desktop/EXE build), then poll until ready.
      const pollAuthSession = useCallback((id) => {
        stopAuthPoll();
        const tick = async () => {
          try {
            const s = await api.authStatus(id);
            setAuthSession(s);
            if (s.availability) setConnection(s.availability);
            if (s.connected) { setCheckingConn(false); stopAuthPoll(); setAuthSession(null); return; }
            if (['error','cancelled','expired'].includes(s.auth_state)) { setCheckingConn(false); stopAuthPoll(); return; }
          } catch (_) {}
          authPollRef.current = setTimeout(tick, 3000);
        };
        tick();
      }, [stopAuthPoll]);

      const connectClaude = useCallback(async (mode='browser') => {
        setCheckingConn(true);
        stopAuthPoll();
        try {
          const j = await api.connect({ mode });
          setAuthSession(j);
          if (j.availability) setConnection(j.availability);
          if (j.connected) { setCheckingConn(false); setAuthSession(null); return; }
          if (!j.started) { addToast(j.error_message || j.error || 'Could not start sign-in.', 'error'); setCheckingConn(false); return; }
          pollAuthSession(j.session_id);
        } catch (_) { addToast('Could not reach the app service.', 'error'); setCheckingConn(false); }
        return;
        try {
          const j = await api.connect();
          if (!j.started) { addToast(j.error || 'Could not start sign-in.', 'error'); setCheckingConn(false); return; }
        } catch (_) { addToast('Could not reach the app service.', 'error'); setCheckingConn(false); return; }
        for (let i = 0; i < 40; i++) {                 // ~2 min of polling while they sign in
          await new Promise(r => setTimeout(r, 3000));
          try { const a = await api.availability(); if (a.connected) { setConnection(a); setCheckingConn(false); return; } } catch (_) {}
        }
        setCheckingConn(false); checkConnection();
      }, [addToast, checkConnection, pollAuthSession, stopAuthPoll]);

      const retryAuth = useCallback(async (mode='browser') => {
        if (!authSession || !authSession.session_id) return connectClaude(mode);
        setCheckingConn(true);
        stopAuthPoll();
        try {
          const s = await api.authRetry(authSession.session_id, { mode });
          setAuthSession(s);
          if (s.availability) setConnection(s.availability);
          if (s.connected) { setCheckingConn(false); setAuthSession(null); return; }
          if (!s.started) { addToast(s.error_message || 'Could not restart sign-in.', 'error'); setCheckingConn(false); return; }
          pollAuthSession(s.session_id);
        } catch (_) { addToast('Could not restart sign-in.', 'error'); setCheckingConn(false); }
      }, [authSession, addToast, connectClaude, pollAuthSession, stopAuthPoll]);

      const cancelAuth = useCallback(async () => {
        if (!authSession || !authSession.session_id) { setCheckingConn(false); setAuthSession(null); return; }
        stopAuthPoll();
        try { setAuthSession(await api.authCancel(authSession.session_id)); } catch (_) {}
        setCheckingConn(false);
      }, [authSession, stopAuthPoll]);

      const submitAuthCode = useCallback(async (code) => {
        if (!authSession || !authSession.session_id) return;
        setCheckingConn(true);
        try {
          const s = await api.authCode(authSession.session_id, code);
          setAuthSession(s);
          if (s.availability) setConnection(s.availability);
          if (s.connected) { setCheckingConn(false); setAuthSession(null); return; }
          pollAuthSession(s.session_id);
        } catch (_) { addToast('Could not submit the sign-in code.', 'error'); setCheckingConn(false); }
      }, [authSession, addToast, pollAuthSession]);

      // a11y: move focus to the new screen's heading on transition (SR + keyboard users land in context)
      useEffect(() => {
        const h = document.querySelector('.page h1, .page .wait-heading, .page .empty-banner .eb-t');
        if (h) { h.setAttribute('tabindex', '-1'); h.focus({ preventScroll: false }); }
      }, [screen, route]);

      // notify-on-complete bonus: a local Notification for users who kept the tab backgrounded
      // (the email opt-in is the mechanism that survives a *closed* tab — §7.7).
      useEffect(() => {
        if (job.status === 'complete' && document.visibilityState === 'hidden' && 'Notification' in window && Notification.permission === 'granted') {
          try { new Notification('Your MIKA read is ready', { body: 'The imaging read is complete.' }); } catch(_){}
        }
      }, [job.status]);

      // ── upload ──
      const SUP = ['.dcm','.nii','.nii.gz','.nrrd','.nhdr','.png','.jpg','.jpeg','.tif','.tiff','.bmp','.zip','.ima','.dicom'];
      const onFiles = useCallback(async (files) => {
        const list = Array.from(files).filter(f => { const n=f.name.toLowerCase(); return SUP.some(e=>n.endsWith(e)) || !n.includes('.'); });
        if (!list.length) { addToast('MIKA could not find a supported scan. Upload DICOM, NIfTI, NRRD, images, or a ZIP.', 'error'); return; }
        const fd = new FormData(); list.forEach(f => fd.append('files', f));
        try {
          const data = await api.upload(fd);
          if (data.job_id) {
            setJob(j => ({ ...j, id:data.job_id }));
            setReady({ file_count:data.file_count, input_format:data.input_format });
            if (data.warnings) data.warnings.forEach(w => addToast(w, 'warning'));
          } else addToast(data.detail || 'Upload failed.', 'error');
        } catch (e) { addToast('Upload failed — is the server running?', 'error'); }
      }, [addToast]);

      // ── lab upload (PDF / photo of a lab or blood report) — reuses the same upload endpoint + job cache ──
      const LAB_SUP = ['.pdf','.png','.jpg','.jpeg','.tif','.tiff','.bmp','.heic','.webp'];
      const onLabFiles = useCallback(async (files) => {
        const list = Array.from(files).filter(f => { const n=f.name.toLowerCase(); return LAB_SUP.some(e=>n.endsWith(e)); });
        if (!list.length) { addToast(L(COPY.lab.badFile), 'error'); return; }
        const fd = new FormData(); list.forEach(f => fd.append('files', f));
        try {
          const data = await api.upload(fd);
          if (data.job_id) {
            setJob(j => ({ ...j, id:data.job_id, kind:'lab' }));   // tag the job lab so screenFor routes the Verdict
            setReady({ file_count:data.file_count, input_format:data.input_format });
            if (data.warnings) data.warnings.forEach(w => addToast(w, 'warning'));
          } else addToast(data.detail || L(COPY.lab.uploadFail), 'error');
        } catch (e) { addToast(L(COPY.lab.uploadFail), 'error'); }
      }, [addToast]);

      // ── status stream (SSE + poll fallback) ──
      const stopStream = useCallback(() => {
        if (esRef.current) { esRef.current.close(); esRef.current = null; }
        if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; }
      }, []);
      // Fetch the finished Read. A completed run is precious — never discard it on a single failed
      // fetch. Retry transient failures (5xx / network) with backoff; only reset to Home on a
      // confirmed 404 (truly expired) after a couple of tries. (sm-03)
      // Active language as a ref so fetchReport reads the current value without re-creating the callback.
      const langRef = useRef(uiPrefs.lang);
      langRef.current = uiPrefs.lang;
      // Overlay the Arabic patient block (when present + fresh) onto the English payload — English fields
      // not yet translated (e.g. reference review) stay English (the degradation floor). If the sidecar
      // isn't built yet, lazily ask the backend to make it, then re-read. Never blocks the English path.
      const applyArabic = useCallback(async (id, data) => {
        if (!data || !data.ar) return data;
        if (data.ar.patient) return { ...data, patient: { ...(data.patient||{}), ...data.ar.patient } };
        const gen = await api.generateArabic(id);
        if (gen && gen.status === 'ok' && gen.patient) return { ...data, patient: { ...(data.patient||{}), ...gen.patient } };
        addToast('Arabic translation isn’t ready yet — showing the report in English.', 'warning');
        return data;   // C floor: English
      }, [addToast]);
      const fetchReport = useCallback(async (id, attempt = 0) => {
        let hardGone = false;
        try {
          const r = await api.report(id, langRef.current);
          if (r.ok) {
            stopStream();
            let data = await r.json();
            if (langRef.current === 'ar') data = await applyArabic(id, data);
            setReport(data);
            setJob(j => ({ ...j, status:'complete', progress:100 }));
            try {   // index it so it can be reopened from Recent studies + survives a refresh
              const tmp = buildViewModel(data);
              const label = (tmp && tmp.study && tmp.study.body_part) || data.detected_anatomy || 'Scan';
              pushRecent({ jobId: id, label, anatomy: data.detected_anatomy || '', date: new Date().toISOString() });
            } catch (_) {}
            return;
          }
          if (r.status === 404 && attempt >= 2) hardGone = true;   // genuinely gone, not a transient blip
        } catch (_) { /* network error → fall through to retry */ }
        if (hardGone) { stopStream(); addToast('This analysis may have expired — please upload again.', 'error'); setJob(EMPTY_JOB); return; }
        if (attempt < 4) { setTimeout(() => fetchReport(id, attempt + 1), 700 * (attempt + 1)); return; }
        // Out of retries but the run did complete — keep the job so the user isn't bounced, and tell them.
        addToast('Your Read is ready but didn’t load — please refresh to view it.', 'error');
      }, [addToast, stopStream, applyArabic]);
      // Re-read the report in the new language when the user flips the AR/EN toggle on a finished study.
      const firstLang = useRef(true);
      useEffect(() => {
        if (firstLang.current) { firstLang.current = false; return; }
        if (job.id && job.status === 'complete') fetchReport(job.id);
      }, [uiPrefs.lang]);
      const watch = useCallback((id) => {
        stopStream();
        let seqDone = false;
        const loadSeq = async () => {
          if (seqDone) return;
          const s = await api.sequences(id);
          setSequences(s);
          // Latch only once the real sequence list lands — anatomy alone (even the 'spine' fallback)
          // must not stop the panel from populating, or it stays empty for the whole Wait. (sm-06)
          if (s.sequences && s.sequences.length) seqDone = true;
        };
        const apply = (s) => {
          // Progress is monotonic — never animate backward (e.g. local seed 8 → first server frame 0). (sm-02)
          setJob(j => ({ ...j, id, status:s.status, progress: Math.max(j.progress || 0, s.progress ?? j.progress ?? 0), message:s.message||'', eta_seconds:s.eta_seconds ?? null, est_total_seconds:s.est_total_seconds ?? j.est_total_seconds, error:s.error||null, active_sequence:s.active_sequence ?? null, active_region:s.active_region ?? null }));
          if (!seqDone) loadSeq();   // detected region + sequence list arrive a beat after analyze starts
          if (s.status === 'complete') { fetchReport(id); }   // fetchReport stops the stream on success
          else if (s.status === 'error') { stopStream(); addToast(`Analysis stopped: ${s.error||'unknown error'}`, 'error'); }
        };
        // Poll fallback that can recover from a gone job: a 404 (in-memory job lost on restart/expiry)
        // resets to Home instead of hammering forever and freezing the Wait at 8%. (sm-01)
        let misses = 0;
        const startPoll = () => {
          if (pollRef.current) return;
          pollRef.current = setInterval(async () => {
            try {
              const r = await api.status(id);
              if (r.ok) { misses = 0; apply(await r.json()); }
              else if (r.status === 404 && ++misses >= 2) { stopStream(); addToast('We lost track of this scan — please upload again.', 'error'); setJob(EMPTY_JOB); }
            } catch (_) { /* transient network error — keep polling */ }
          }, 1500);
        };
        try {
          const es = new EventSource(`${API_BASE}/api/status/${id}/stream`); esRef.current = es;
          es.onmessage = e => { try { apply(JSON.parse(e.data)); } catch(_){} };
          es.onerror = () => { es.close(); esRef.current=null; startPoll(); };
        } catch (e) {
          startPoll();
        }
        loadSeq();
      }, [stopStream, fetchReport, addToast]);

      // ── analyze ──
      const onStart = useCallback(async () => {
        if (!job.id) return;
        let pf = connection;
        try { pf = await api.preflight(); setConnection(pf); } catch (_) {}
        if (!pf || !pf.connected || !pf.ready) { setShowConnect(true); return; }  // must be connected to Claude
        try {
          const r = await api.analyze({ job_id:job.id, mode:'agent', clinical_history: history || null });
          if (r.detail || r.error_message) { addToast(detailText(r.detail || r.error_message, 'Could not start the read.'), 'error'); if (r.auth_state) setConnection(c => ({ ...(c||{}), connected:false, auth_state:r.auth_state, error_message:r.error_message||r.detail })); return; }
          setConnection(c => ({ ...(c||{}), connected:true, ready:true, auth_state:'connected', error_message:null }));
          setJob(j => ({ ...j, status:'inventory', mode:r.mode||'agent', progress:8, est_total_seconds:j.est_total_seconds }));
          setReady(null);
          watch(job.id);
        } catch (e) { addToast('I couldn’t start the read. Please try again.', 'error'); }
      }, [job.id, history, watch, addToast, connection]);

      // ── analyze (lab) — same gate + SSE, but kind:'lab' routes the backend lab-reader path ──
      const onLabStart = useCallback(async () => {
        if (!job.id) return;
        let pf = connection;
        try { pf = await api.preflight(); setConnection(pf); } catch (_) {}
        if (!pf || !pf.connected || !pf.ready) { setShowConnect(true); return; }
        try {
          const r = await api.analyze({ job_id:job.id, mode:'agent', kind:'lab' });
          if (r.detail || r.error_message) { addToast(detailText(r.detail || r.error_message, L(COPY.lab.startFail)), 'error'); if (r.auth_state) setConnection(c => ({ ...(c||{}), connected:false, auth_state:r.auth_state, error_message:r.error_message||r.detail })); return; }
          setConnection(c => ({ ...(c||{}), connected:true, ready:true, auth_state:'connected', error_message:null }));
          setJob(j => ({ ...j, kind:'lab', status:'inventory', mode:r.mode||'agent', progress:8, est_total_seconds:j.est_total_seconds }));
          setReady(null);
          watch(job.id);
        } catch (e) { addToast(L(COPY.lab.startFail), 'error'); }
      }, [job.id, watch, addToast, connection]);

      // resume deep-link (§7.7) — verify the job actually exists before assuming it's mid-run, so an
      // expired/gone link shows a clear message instead of stranding the user on a frozen Wait. (sm-01)
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const deepLinkJob = params.get('job_id') || DEEP_LINK_JOB;
        if (params.get('demo') || !deepLinkJob) return stopStream;
        (async () => {
          try {
            const r = await api.status(deepLinkJob);
            if (!r.ok) {
              addToast('That scan link has expired or was not found — please upload again.', 'error');
              setJob(EMPTY_JOB);
              return;
            }
            const s = await r.json();
            if (s.status === 'complete') {
              const rr = await api.report(deepLinkJob);
              if (!rr.ok) throw new Error('report not available');
              const data = await rr.json();
              setReport(data);
              setRoute(null);
              setJob(j=>({...j, id:deepLinkJob, status:'complete', progress:100}));
              try {
                const tmp = buildViewModel(data);
                const label = (tmp && tmp.study && tmp.study.body_part) || data.detected_anatomy || 'Scan';
                pushRecent({ jobId: deepLinkJob, label, anatomy: data.detected_anatomy || '', date: new Date().toISOString() });
              } catch (_) {}
              return;
            }
            if (s.status === 'error') { setJob(j=>({...j, id:deepLinkJob, status:'error', error:s.error||'Analysis failed'})); addToast(`Analysis stopped: ${s.error||'unknown error'}`, 'error'); return; }
            setJob(j=>({...j, id:deepLinkJob, status:s.status||'interpreting', progress:s.progress ?? 8}));
            watch(deepLinkJob);
          } catch (e) {
            console.error('MIKA resume failed', e);
            setJob(EMPTY_JOB);
            addToast('Could not reach the app service to resume your scan.', 'error');
          }
        })();
        return stopStream;
      }, [addToast, fetchReport, stopStream, watch]);

      // Mirror (route, job) into the URL as real history entries so the browser Back/Forward buttons
      // move between Home → Recent → a Read like any web app, with no dead-ends. A refresh restores the
      // same place (resume effect reads ?job_id; popstate reads ?route). The `popping` guard stops a
      // Back/Forward restore from pushing a duplicate entry.
      useEffect(() => {
        if (DEMO) return;
        // First run on mount: leave the URL exactly as loaded so a deep-link ?job_id survives until the
        // async resume effect sets the job (otherwise we'd push a clean '/' entry and strip the param).
        if (!didMountUrl.current) { didMountUrl.current = true; return; }
        if (popping.current) { popping.current = false; return; }
        try {
          const u = new URL(window.location.href);
          if (!job.id && job.status === 'pending' && u.searchParams.get('job_id')) return;
          if (job.id && job.status !== 'pending') u.searchParams.set('job_id', job.id);
          else u.searchParams.delete('job_id');
          if (route) u.searchParams.set('route', route); else u.searchParams.delete('route');
          if (u.toString() !== window.location.href) {
            window.history.pushState({ route: route || null, jobId: job.id || null }, '', u.toString());
          }
        } catch (_) {}
      }, [job.id, job.status, route]);

      // ── navigation (no dead-ends: every screen can reach New study / current Read / Recent / Shared) ──
      const goNew = useCallback(() => {
        stopStream(); setReport(null); setSequences({ sequences:[] }); setReady(null);
        if (compareAbortRef.current) { compareAbortRef.current.abort(); compareAbortRef.current = null; }
        setCompareState(EMPTY_COMPARE);
        setActiveId(null); setRoute(null); setUiPrefs(p => ({ ...p, view:'plain' }));
        setJob(EMPTY_JOB);
      }, [stopStream]);
      const openRecent = useCallback((jobId) => {
        if (!jobId) return;
        setRoute(null); setJob(j => ({ ...j, id:jobId, status:'complete', progress:100 })); fetchReport(jobId);
      }, [fetchReport]);
      const onNav = useCallback((dest) => {
        if (dest === 'new') goNew();
        else if (dest === 'current') setRoute(null);
        else if (dest === 'recent') setRoute('recent');
        else if (dest === 'lab') {
          // Open the lab surface. If the active job isn't a lab job, clear it so lab-home shows the dropzone
          // (an imaging job left in the cache would otherwise resolve to its own screen under route override).
          setRoute('lab');
          if (job.kind !== 'lab') { stopStream(); setReport(null); setSequences({ sequences:[] }); setReady(null); setJob({ ...EMPTY_JOB, kind:'lab' }); }
        }
      }, [goNew, job.kind, stopStream]);

      // Browser Back/Forward: restore the view (route + study) from the URL, without re-pushing.
      // Defined after goNew/openRecent so their bindings are initialized when this effect registers.
      useEffect(() => {
        if (DEMO) return;
        const onPop = () => {
          popping.current = true;
          try {
            const u = new URL(window.location.href);
            const nextRoute = u.searchParams.get('route') === 'recent' ? 'recent' : null;
            const jid = u.searchParams.get('job_id');
            if (jid) {
              setRoute(nextRoute);
              if (jid !== job.id) { setJob(j => ({ ...j, id:jid, status:'complete', progress:100 })); fetchReport(jid); }
            } else {
              // This history entry has no study: clear the job but HONOR the entry's route, so Back to
              // the Recent list lands on Recent (not Home) and doesn't silently destroy the open Read.
              stopStream(); setReport(null); setSequences({ sequences:[] }); setReady(null);
              setActiveId(null); setUiPrefs(p => ({ ...p, view:'plain' })); setJob(EMPTY_JOB);
              setRoute(nextRoute);
            }
          } catch (_) {}
          setTimeout(() => { popping.current = false; }, 0);   // backstop if no state actually changed
        };
        window.addEventListener('popstate', onPop);
        return () => window.removeEventListener('popstate', onPop);
      }, [job.id, fetchReport, stopStream]);

      const onCompareReport = useCallback(async ({ file, text }) => {
        if (!job.id) return;
        const cleanText = (text || '').trim();
        if (!file && !cleanText) {
          setCompareState(s => ({ ...(s || EMPTY_COMPARE), status:'error', error:'Upload a report PDF/text file or paste report text first.' }));
          return;
        }
        if (compareAbortRef.current) compareAbortRef.current.abort();
        const controller = new AbortController();
        compareAbortRef.current = controller;
        const fd = new FormData();
        fd.append('job_id', job.id);
        if (file) fd.append('reference_report', file);
        if (cleanText) fd.append('reference_report_text', cleanText);
        setCompareState(s => ({ ...(s || EMPTY_COMPARE), status:'running', error:null }));
        try {
          const data = await api.reconcileUpload(fd, controller.signal);
          setReport(data);
          setCompareState(s => ({ ...(s || EMPTY_COMPARE), status:'success', error:null }));
          try {
            const tmp = buildViewModel(data);
            const label = (tmp && tmp.study && tmp.study.body_part) || data.detected_anatomy || 'Scan';
            pushRecent({ jobId: job.id, label, anatomy: data.detected_anatomy || '', date: new Date().toISOString(), referenceReview:true });
          } catch (_) {}
          addToast('MIKA compared your report with the independent read.', 'success');
        } catch (e) {
          if (controller.signal.aborted) {
            setCompareState(s => ({ ...(s || EMPTY_COMPARE), status:'cancelled', error:null }));
          } else {
            setCompareState(s => ({ ...(s || EMPTY_COMPARE), status:'error', error:e.message || 'Could not compare the report.' }));
            addToast(e.message || 'Could not compare the report.', 'error');
          }
        } finally {
          if (compareAbortRef.current === controller) compareAbortRef.current = null;
        }
      }, [job.id, addToast]);

      const onCancelCompare = useCallback(() => {
        if (compareAbortRef.current) compareAbortRef.current.abort();
        setCompareState(s => ({ ...(s || EMPTY_COMPARE), status:'cancelled', error:null }));
      }, []);

      const onDownload = useCallback((kind='patient') => {
        if (!job.id) return;
        const endpoint = kind === 'clinical' ? 'clinical-pdf' : 'pdf';
        const q = (kind !== 'clinical' && langRef.current === 'ar') ? '?lang=ar' : '';  // Arabic patient PDF
        window.open(`${API_BASE}/api/report/${job.id}/${endpoint}${q}`, '_blank');
      }, [job.id]);
      const onNotify = useCallback(async () => {
        if (!('Notification' in window)) {
          addToast('Desktop notifications are not available in this browser.', 'warning');
          return;
        }
        if (Notification.permission === 'granted') {
          addToast('Notifications are already on. MIKA will alert you when the read is ready.', 'success');
          return;
        }
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          addToast('Notifications are on. MIKA will alert you when the read is ready.', 'success');
        } else {
          addToast('Notifications were not enabled. Keep MIKA open to watch progress.', 'warning');
        }
      }, [addToast]);
      const onClinician = useCallback(() => setUiPrefs(p => ({ ...p, view:'clinician' })), []);

      const _anatomyOverride = QS.get('anatomy');   // dev: ?anatomy=brain|msk to test precise pointing per region
      const _demoBase = dm==='read-empty' ? DEMO_REPORT_EMPTY
        : (DEMO_BY_ANATOMY[_anatomyOverride] || (_anatomyOverride ? { ...DEMO_REPORT, detected_anatomy:_anatomyOverride } : DEMO_REPORT));
      const demoVm = dm ? buildViewModel(_demoBase) : null;
      const demoProgress = dm==='wait' ? { status:'interpreting', progress:60, eta_seconds:660, est_total_seconds:1300, active_sequence:'STIR', active_region:'L4-L5', message:'Reading STIR images' } : null;
      const effVm = dm ? demoVm : vm;
      // Lab payload (kind:'lab') renders the Verdict directly from report.json — NOT through buildViewModel
      // (that backfills DICOM-shaped fields). Demo lab screens use a hardcoded fixture so they render
      // without a backend; a live lab job reads the raw `report`.
      const labReport = (dm === 'lab-read') ? DEMO_LAB_REPORT
        : (report && report.kind === 'lab') ? report : null;

      // route ('recent') overrides the job-derived screen. The 'lab' nav route is special: it isn't a screen
      // name — it opens the lab surface, which is lab-home until a lab job exists (then screenFor drives it).
      const view = dm ? screen
        : (route === 'lab' ? (job.kind === 'lab' && job.id ? screen : 'lab-home')
        : (route || screen));
      const chatDocked = chatOpen && !dm && !!job.id;   // matches the ChatDrawer render condition → reflow the canvas
      return (
        <div className={`shell${chatDocked ? ' chat-open' : ''}`}>
          <Sidebar screen={screen} route={dm?null:route} hasJob={!dm && !!job.id && job.status!=='pending'}
            onAbout={()=>setShowAbout(true)} onNav={onNav} connection={connection}
            onConnect={()=>{ setShowConnect(true); checkConnection(); }}
            onHelp={()=>addToast('Need a hand? In the full app this opens help — for now, email the team.', 'success')} />
          <div className="canvas">
            <TopBar screen={view} connection={connection} vm={effVm} progress={dm?demoProgress:job}
              chatAvail={chatAvail && !dm} chatOpen={chatOpen && !dm && !!job.id} onAsk={()=>setChatOpen(o=>!o)}
              uiPrefs={uiPrefs} setUiPrefs={setUiPrefs} onDownload={onDownload}
              onConnect={()=>{ setShowConnect(true); checkConnection(); }} onNotify={onNotify} checking={checkingConn} />
            <div className="page">
              {view === 'home' && <HomeScreen onFiles={onFiles} ready={ready} onStart={onStart} history={history} setHistory={setHistory} onNav={onNav} chatAvail={chatAvail && !dm} />}
              {view === 'lab-home' && <LabHomeScreen onFiles={onLabFiles} ready={ready} onStart={onLabStart} />}
              {view === 'lab-read' && <LabReadScreen report={labReport} jobId={dm?'demo':job.id} />}
              {view === 'wait' && (() => { const sq = dm?DEMO_SEQUENCES:sequences; return <WaitScreen progress={dm?demoProgress:job} sequences={sq} anatomy={figureAnatomy(sq.anatomy || (effVm&&effVm.anatomy) || 'unknown', sq.anatomy_subregion || '')} jobId={dm?'demo':job.id} />; })()}
              {view === 'read' && effVm && <ReadScreen vm={effVm} jobId={dm?'demo':job.id} view={uiPrefs.view} activeId={activeId} setActiveId={setActiveId}
                onZoom={setLightbox} onClinician={onClinician} compareState={compareState} setCompareState={setCompareState}
                onCompareReport={onCompareReport} onCancelCompare={onCancelCompare}
                onDownload={onDownload} chatOpen={chatOpen} setChatOpen={setChatOpen} chatAvail={chatAvail && !dm} />}
              {view === 'recent' && <RecentScreen onOpen={openRecent} onNew={goNew} />}
            </div>
          </div>
          {showAbout && <AboutModal onClose={()=>setShowAbout(false)} />}
          {chatOpen && !dm && job.id && <ChatDrawer jobId={job.id} studyLabel={(effVm && effVm.study) ? [effVm.study.body_part, effVm.study.modality].filter(Boolean).join(' · ') : ''} onClose={()=>setChatOpen(false)} />}
          {showConnect && <ConnectModal connection={connection} authSession={authSession} checking={checkingConn}
            onConnect={()=>connectClaude('browser')} onUseCode={()=>retryAuth('code')} onSubmitCode={submitAuthCode}
            onRetry={()=>retryAuth('browser')} onCancel={cancelAuth} onRecheck={checkConnection}
            onClose={()=>{ stopAuthPoll(); setShowConnect(false); }} />}
          <Lightbox src={lightbox} onClose={()=>setLightbox(null)} />
          <ToastContainer toasts={toasts} />
        </div>
      );
    }

    /* ═══════════════ Dev fixtures (visual gate without a 20-min run) ═══════════════ */
    const DEMO_REPORT = {
      job_id:'demo', mode:'agent', detected_anatomy:'spine', pdf_available:true, clinical_pdf_available:true,
      disclaimer:'MIKA is an AI assistant and does not replace a doctor. Review all findings with a qualified clinician.',
      verification:{ status:'passed', quality_score:88 },
      agent:{ summary:{ patient:{
        patient:{ name:'', age:'', sex:'' },
        study:{ body_part:'Lower-back (lumbar) spine', modality:'MRI with contrast', date:'', comparison:'' },
        bottom_line:'At L5-S1, disc material contacts the S1 nerve root. This can match pain, tingling, or numbness down the leg.',
        confidence:{ label:'High', score:88, note:'Confirmed across more than one view.' },
        key_points:['L5-S1 disc material contacts the nearby S1 nerve root.','The spinal canal is mildly narrowed at L4-L5.','No emergency pattern was flagged in this read.'],
        findings:[
          { plain:'L5-S1 disc material contacts the S1 nerve root', certainty:'Confirmed', figure:'/assets/_demo/proof-l5s1.png', caption:'The disc between L5 and S1 contacts and displaces the descending S1 nerve root.' },
          { plain:'Mild spinal canal narrowing at L4-L5', certainty:'Confirmed', figure:'/assets/_demo/proof-l4l5-canal.png', caption:'Mild central canal narrowing; no cord or cauda compression.' },
          { plain:'Small annular tear at L4-L5', certainty:'Possible', figure:'/assets/_demo/proof-l4l5-tear.png', caption:'A small high-signal zone in the disc rim may represent an annular tear.' },
        ],
        what_it_means:['The L5-S1 disc contact can match pain, tingling, or numbness traveling down the leg.','Treatment decisions depend on symptoms, the physical exam, and clinician review.'],
        worth_flagging:[],
        disclaimer:'MIKA is an AI assistant and does not replace a doctor. Review all findings with a qualified clinician.',
      }, findings:[
        {text:'L5-S1 disc material contacts and displaces the descending S1 nerve root [Tier A]', tier:'A', figure:'fig1.png'},
        {text:'Mild central canal narrowing at L4-L5 without cord or cauda compression [Tier A]', tier:'A', figure:'fig2.png'},
        {text:'Small annular fissure at L4-L5 [Tier C]', tier:'C', figure:'fig3.png'},
      ] } },
    };
    const DEMO_REPORT_EMPTY = { ...DEMO_REPORT, agent:{ summary:{ patient:{ ...DEMO_REPORT.agent.summary.patient, bottom_line:'', findings:[], what_it_means:[], worth_flagging:[], key_points:['No significant abnormality was flagged on this automated read.'], confidence:{label:'Moderate', note:'Limited by image quality in places.'} } } } };
    // Lab demo (kind:'lab') — drives ?demo=lab-read with NO backend: 2 flagged (low Vit D two-sided,
    // high LDL two-sided), a qualitative result, ~22 normals, and one low-clarity item for "Other results".
    const DEMO_LAB_REPORT = (() => {
      const normalNames = ['Sodium','Potassium','Chloride','Calcium','Glucose (fasting)','Creatinine','eGFR',
        'Hemoglobin','Hematocrit','White cell count','Platelets','ALT','AST','Total bilirubin','Albumin',
        'TSH','HbA1c','Total cholesterol','HDL','Triglycerides','Ferritin','Vitamin B12'];
      const normals = normalNames.map((nm, i) => ({
        plain_name:nm, analyte_raw:nm, value:'—', unit:'', ref_range_text:'within range',
        range_type:'two_sided_numeric', status:'normal', severity_phrase:'normal', confidence:'Confirmed',
        plain_meaning:'within the normal range.', clarity:0.95, page_index:0, source_text:`${nm} — normal`,
      }));
      const flagged = [
        { plain_name:'Vitamin D', analyte_raw:'25-hydroxyvitamin D', value:'18', unit:'ng/mL',
          ref_range_text:'30-100', range_type:'two_sided_numeric', status:'low', severity_phrase:'a bit low',
          confidence:'Likely', plain_meaning:'Low vitamin D is common and can leave you feeling tired.',
          clarity:0.92, page_index:0, source_text:'Vitamin D (25-OH) 18 ng/mL (30-100)' },
        { plain_name:'LDL cholesterol', analyte_raw:'LDL-C, calculated', value:'182', unit:'mg/dL',
          ref_range_text:'0-130', range_type:'two_sided_numeric', status:'high', severity_phrase:'clearly high',
          confidence:'Confirmed', plain_meaning:'A higher LDL is one of several things that affect heart health over time.',
          clarity:0.96, page_index:0, source_text:'LDL Cholesterol 182 mg/dL (<130)' },
      ];
      const qualitative = { plain_name:'Urine culture', analyte_raw:'Urine culture', value:'No growth', unit:'',
        ref_range_text:'No growth', range_type:'qualitative', status:'normal', severity_phrase:'normal',
        confidence:'Confirmed', plain_meaning:'No bacteria grew in the sample.', clarity:0.9, page_index:0,
        source_text:'Urine culture: no growth at 48h' };
      const lowClarity = { plain_name:'Handwritten note', analyte_raw:'', value:'', unit:'', ref_range_text:null,
        range_type:'qualitative', status:'unknown', severity_phrase:'', confidence:'Possible',
        plain_meaning:'', clarity:0.4, page_index:0, source_text:'(unclear handwriting)' };
      const results = [...flagged, ...normals, qualitative, lowClarity];
      const checked = results.length;
      const normal_count = normals.length + 1;   // normals + the qualitative no-growth
      return {
        kind:'lab',
        overall:{ takeaway:'2 things worth a look.', confidence:'moderate',
          checked_count:checked, normal_count, flagged_count:flagged.length, verdict_key:'FEW' },
        results,
        signals:{ extraction_confidence:0.93, analytes_parsed:checked, render_quality:'clear' },
      };
    })();

    const DEMO_SEQUENCES = { anatomy:'spine', modality:'MR', level_map:'/assets/_demo/proof-levelref.png', sequences:[
      {name:'Sag T2', plane:'sagittal', num_slices:15, thumb:'/assets/_demo/proof-levelref.png'},
      {name:'Sag T1', plane:'sagittal', num_slices:15, thumb:'/assets/_demo/proof-l5s1.png'},
