name: release

# Push to main (or run manually) → auto-versioned build → GitHub Release with the installer + a
# VERIFIED OTA zip. Installed apps pull the OTA zip silently on next launch (see electron/main.js).
# No code-signing: integrity is enforced by the SHA-256 in manifest.json, which the app checks before
# applying. Unsigned installer (one-time SmartScreen on first install).
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for the commit-count version

      - name: Compute version (3.0.<commit count>)
        id: ver
        shell: bash
        run: |
          VERSION="3.0.$(git rev-list --count HEAD)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "MIKA version ${VERSION}"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Safety gate — full suite must pass before we build anything
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
          python -m pytest backend/tests tests -q

      - name: "Stamp the version (single source — version.txt = app.py = package.json)"
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          Set-Content -Path version.txt -Value $v -NoNewline -Encoding ascii
          (Get-Content backend/app.py -Raw) -replace 'version\s*=\s*"3\.0\.0"', "version=`"$v`"" | Set-Content backend/app.py -Encoding utf8
          Push-Location electron; npm version $v --no-git-tag-version --allow-same-version | Out-Null; Pop-Location
          Write-Host "stamped v$v"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install electron deps
        working-directory: electron
        run: npm ci --no-audit --no-fund

      - name: Build the bundled Python runtime (embeddable + locked wheels)
        working-directory: electron
        shell: pwsh
        run: pwsh -File scripts/fetch-python.ps1

      - name: Build the unsigned NSIS installer
        working-directory: electron
        run: npx electron-builder --win --publish never

      - name: Build the VERIFIED OTA zip + manifest (backend + frontend source)
        id: ota
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $stage = "ota-stage"
          New-Item -ItemType Directory -Force -Path "$stage" | Out-Null
          # Mirror the installer's extraResources excludes so the OTA payload == the installed payload.
          robocopy backend "$stage/backend" /E /XD __pycache__ .pytest_cache tests data validation _archive /XF *.pyc | Out-Null
          if ($LASTEXITCODE -ge 8) { throw "robocopy backend failed ($LASTEXITCODE)" }
          robocopy frontend "$stage/frontend" /E /XD _archive _demo /XF bloodwork*.png | Out-Null
          if ($LASTEXITCODE -ge 8) { throw "robocopy frontend failed ($LASTEXITCODE)" }
          $global:LASTEXITCODE = 0
          $zip = "MIKA-OTA-v$v.zip"
          Compress-Archive -Path "$stage/backend","$stage/frontend" -DestinationPath $zip -Force
          $sha = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          # The app downloads manifest.json, then refuses to apply the zip unless its SHA-256 matches.
          @{ version = $v; sha256 = $sha; requires_reinstall = $false } | ConvertTo-Json | Set-Content manifest.json -Encoding ascii
          echo "zip=$zip" >> $env:GITHUB_OUTPUT
          Write-Host "OTA $zip sha256=$sha"

      - name: Name the installer
        id: inst
        shell: pwsh
        run: |
          $exe = Get-ChildItem electron/dist -Filter *.exe | Where-Object { $_.Name -notmatch '\.blockmap' } | Select-Object -First 1
          if (-not $exe) { Get-ChildItem electron/dist; throw "no installer exe found" }
          $new = "MIKA-Setup-v${{ steps.ver.outputs.version }}.exe"
          Move-Item $exe.FullName "electron/dist/$new"
          echo "exe=electron/dist/$new" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release (installer + OTA zip + manifest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: MIKA v${{ steps.ver.outputs.version }}
          body: |
            MIKA v${{ steps.ver.outputs.version }}

            **Installer** (`MIKA-Setup-*.exe`) — full standalone install, no Python needed. Unsigned:
            on first run Windows SmartScreen shows "More info → Run anyway".
            **Auto-update** — installed apps pull `MIKA-OTA-*.zip` silently on next launch, after
            verifying it against `manifest.json` (SHA-256). No action needed.
          files: |
            ${{ steps.inst.outputs.exe }}
            ${{ steps.ota.outputs.zip }}
            manifest.json
